<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Street View LATAM · Dashboard (teste)</title>

  <!-- FOUC: aplica o tema salvo (mesmo localStorage do portal) antes de renderizar -->
  <script>(function(){try{if(localStorage.getItem('AC_THEME')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Leaflet (mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Auth + tema do portal (login gate + tokens dark compartilhados + login/topbar CSS) -->
  <script src="auth.js?v=20260518b"></script>
  <link rel="stylesheet" href="theme.css?v=20260519a">
  <script src="common.js?v=20260519a"></script>

  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F4F6FA; --surface: #FFFFFF;
    --ink: #0E1726; --ink-2: #56627A; --muted: #97A1B2;
    --line: #E7EAF1; --line-2: #F2F4F9;
    --primary: #2563EB; --primary-700: #1D4ED8; --primary-soft: #EEF3FF;
    --nav-bg: #0E1830; --nav-line: rgba(255,255,255,.08); --nav-txt: #9AA7BE; --nav-txt-dim: #6C7894;
    --green: #16A34A; --green-bg: #E7F7EE;
    --amber: #C77A06; --amber-bg: #FDF1DF;
    --red: #DC2626;   --red-bg: #FCEAEA;
    --indigo: #4F46E5; --indigo-bg: #ECEDFD;
    --r-card: 16px; --r-ctrl: 10px;
    --sh-sm: 0 1px 2px rgba(14,23,38,.05);
    --sh: 0 1px 2px rgba(14,23,38,.04), 0 10px 24px -16px rgba(14,23,38,.20);
    --sh-lg: 0 20px 50px -22px rgba(14,23,38,.34);
    --sh-pop: 0 14px 40px -10px rgba(14,23,38,.28);
  }
  html, body { height: 100%; }
  body { font-family: "Plus Jakarta Sans", system-ui, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  #root { min-height: 100%; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ::selection { background: #C7D7FF; }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------------- shell ---------------- */
  .app { display: flex; min-height: 100vh; }

  /* ---------------- sidebar (navy) ---------------- */
  .sidebar { width: 250px; flex-shrink: 0; background: var(--nav-bg); color: var(--nav-txt); position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; padding: 20px 14px; }
  .brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 20px; margin-bottom: 6px; border-bottom: 1px solid var(--nav-line); }
  .brand-mark { width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0; background: linear-gradient(140deg, #2563EB, #5B8DEF); color: #fff; font-weight: 800; font-size: 15px; display: grid; place-items: center; box-shadow: 0 8px 18px -6px rgba(37,99,235,.7); }
  .brand-name { font-weight: 800; font-size: 15.5px; color: #fff; letter-spacing: -.2px; line-height: 1.1; }
  .brand-region { font-size: 10.5px; font-weight: 700; color: #6F8BD6; letter-spacing: 1.6px; margin-top: 1px; }
  .nav { flex: 1; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; padding-top: 8px; }
  .nav-group { margin-bottom: 12px; }
  .nav-group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--nav-txt-dim); padding: 4px 12px 7px; }
  .nav-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 12px; border-radius: var(--r-ctrl); font-size: 13.5px; font-weight: 600; color: var(--nav-txt); transition: background .14s, color .14s; }
  .nav-ico { color: var(--nav-txt-dim); display: inline-flex; transition: color .14s; }
  .nav-item:hover { background: rgba(255,255,255,.05); color: #E7ECF5; }
  .nav-item:hover .nav-ico { color: #C3CEE2; }
  .nav-item.active { background: linear-gradient(135deg, #2563EB, #3B7BF0); color: #fff; box-shadow: 0 10px 22px -12px rgba(37,99,235,.9); }
  .nav-item.active .nav-ico { color: #fff; }
  .nav-label { flex: 1; text-align: left; }
  .nav-tag { font-size: 10px; font-weight: 700; letter-spacing: .4px; color: #B9C6E6; background: rgba(255,255,255,.09); padding: 2px 7px; border-radius: 6px; }
  .nav-item.active .nav-tag { background: rgba(255,255,255,.22); color: #fff; }
  .nav-ext { color: var(--nav-txt-dim); display: inline-flex; }
  .nav-parent { display: flex; flex-direction: column; }
  .nav-toggle.parent-active { color: #E7ECF5; background: rgba(255,255,255,.04); }
  .nav-toggle.parent-active .nav-ico { color: #C3CEE2; }
  .nav-caret { color: var(--nav-txt-dim); display: inline-flex; transition: transform .18s; }
  .nav-caret.open { transform: rotate(180deg); }
  .nav-sub { display: flex; flex-direction: column; gap: 1px; margin: 3px 0 4px 25px; padding-left: 11px; border-left: 1px solid var(--nav-line); }
  .nav-subitem { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 12.5px; font-weight: 600; color: var(--nav-txt); text-align: left; }
  .nav-subitem:hover { background: rgba(255,255,255,.05); color: #E7ECF5; }
  .nav-sub-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--nav-txt-dim); flex-shrink: 0; transition: background .14s; }
  .nav-subitem.active { color: #fff; }
  .nav-subitem.active .nav-sub-dot { background: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.28); }
  .sidebar-foot { display: flex; align-items: center; gap: 10px; padding: 12px 10px 4px; border-top: 1px solid var(--nav-line); margin-top: 6px; }
  .sf-dot { width: 8px; height: 8px; border-radius: 50%; background: #34D399; box-shadow: 0 0 0 3px rgba(52,211,153,.18); flex-shrink: 0; }
  .sf-line1 { font-size: 11.5px; font-weight: 700; color: #C3CEE2; }
  .sf-line2 { font-size: 10.5px; color: var(--nav-txt-dim); }

  /* ---------------- main + topbar ---------------- */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 14px; padding: 12px 26px; background: rgba(244,246,250,.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .searchbox { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; width: min(380px, 34vw); color: var(--muted); box-shadow: var(--sh-sm); }
  .searchbox input { border: none; outline: none; flex: 1; font-size: 13.5px; color: var(--ink); background: none; }
  .searchbox input::placeholder { color: var(--muted); }
  .search-kbd { font-size: 10.5px; font-weight: 700; color: var(--muted); border: 1px solid var(--line); border-radius: 5px; padding: 2px 5px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 9px; }
  .tool-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); padding: 8px 12px; border-radius: var(--r-ctrl); box-shadow: var(--sh-sm); transition: all .14s; white-space: nowrap; }
  .tool-btn:hover { border-color: #C9D6F2; color: var(--ink); }
  .tool-btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 8px 18px -8px rgba(37,99,235,.6); }
  .tool-btn.primary:hover { background: var(--primary-700); color: #fff; }
  .tool-btn.on { border-color: var(--primary); }
  .t-divider { width: 1px; height: 26px; background: var(--line); }
  .lang-switch { display: flex; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px; box-shadow: var(--sh-sm); }
  .lang-switch button { font-size: 11.5px; font-weight: 700; color: var(--muted); padding: 5px 9px; border-radius: 999px; }
  .lang-switch button.active { background: var(--primary); color: #fff; }
  .icon-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--surface); border: 1px solid var(--line); display: grid; place-items: center; color: var(--ink-2); position: relative; box-shadow: var(--sh-sm); }
  .icon-btn:hover { color: var(--primary); }
  .icon-btn.has-dot::after { content: ""; position: absolute; top: 8px; right: 9px; width: 7px; height: 7px; background: var(--red); border-radius: 50%; border: 2px solid var(--surface); }
  .user-pill { display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 4px 9px 4px 4px; box-shadow: var(--sh-sm); cursor: pointer; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#2563EB,#60A5FA); color: #fff; font-weight: 700; font-size: 12.5px; display: grid; place-items: center; }
  .user-meta { line-height: 1.15; }
  .user-name { font-size: 12.5px; font-weight: 700; }
  .user-role { font-size: 10.5px; color: var(--muted); font-weight: 600; }
  .user-chev { color: var(--muted); display: inline-flex; }

  /* popovers */
  .pop-wrap { position: relative; }
  .pop { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--sh-pop); padding: 10px; z-index: 2400; animation: pop .14s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } }
  .date-pop { width: 250px; }
  .pop-seg { display: flex; background: var(--line-2); border-radius: 9px; padding: 3px; gap: 2px; }
  .pop-seg button { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--ink-2); padding: 6px; border-radius: 7px; }
  .pop-seg button.on { background: var(--surface); color: var(--primary); box-shadow: var(--sh-sm); }
  .pop-divider { height: 1px; background: var(--line); margin: 10px 0; }
  .pop-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 9px; }
  .pop-field span { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .pop-field input { border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 12.5px; color: var(--ink); }
  .pop-range { display: flex; gap: 6px; }
  .pop-range input { flex: 1; min-width: 0; }
  .pop-apply { width: 100%; background: var(--primary); color: #fff; font-weight: 700; font-size: 13px; padding: 9px; border-radius: 9px; margin-top: 2px; }
  .exp-pop { width: 280px; display: flex; flex-direction: column; gap: 2px; }
  .exp-item { display: flex; align-items: center; gap: 11px; padding: 10px; border-radius: 10px; text-align: left; transition: background .12s; }
  .exp-item:hover { background: var(--line-2); }
  .exp-item.hi { border-top: 1px solid var(--line); margin-top: 4px; padding-top: 13px; }
  .exp-ico { width: 34px; height: 34px; border-radius: 9px; background: var(--primary-soft); color: var(--primary); display: grid; place-items: center; flex-shrink: 0; }
  .exp-item.hi .exp-ico { background: #FEF3C7; color: #B45309; }
  .exp-t { display: block; font-size: 13px; font-weight: 700; color: var(--ink); }
  .exp-s { display: block; font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  /* ---------------- content ---------------- */
  .content { padding: 24px 26px 36px; max-width: 1560px; width: 100%; margin: 0 auto; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .page-title { font-size: 25px; font-weight: 800; letter-spacing: -.6px; }
  .page-sub { color: var(--ink-2); font-size: 13.5px; margin-top: 3px; max-width: 640px; }
  .page-meta { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .updated { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(22,163,74,.45);} 70% { box-shadow: 0 0 0 7px rgba(22,163,74,0);} 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0);} }
  .filter-flag { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--primary); background: var(--primary-soft); border: 1px solid #D6E2FB; padding: 5px 10px; border-radius: 999px; }

  /* filters */
  .filterbar { display: flex; align-items: center; gap: 11px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-cap { font-size: 10.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 12.5px; font-weight: 600; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); padding: 6px 12px; border-radius: 999px; transition: all .13s; }
  .chip:hover { border-color: #C9D6F2; color: var(--ink); }
  .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------------- KPI ---------------- */
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 18px; }
  .kpi { position: relative; text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 16px; display: flex; gap: 13px; box-shadow: var(--sh); transition: transform .15s, box-shadow .15s, border-color .15s; }
  .kpi:hover { transform: translateY(-3px); box-shadow: var(--sh-lg); }
  .kpi.active { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary), var(--sh); }
  .kpi-ico { width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0; display: grid; place-items: center; }
  .tone-blue { background: var(--primary-soft); color: var(--primary); }
  .tone-indigo { background: var(--indigo-bg); color: var(--indigo); }
  .tone-green { background: var(--green-bg); color: var(--green); }
  .tone-amber { background: var(--amber-bg); color: var(--amber); }
  .tone-red { background: var(--red-bg); color: var(--red); }
  .kpi-body { min-width: 0; flex: 1; }
  .kpi-label { font-size: 11.5px; font-weight: 600; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi-value-row { display: flex; align-items: baseline; gap: 7px; margin: 3px 0 2px; }
  .kpi-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
  .kpi-delta { display: inline-flex; align-items: center; gap: 1px; font-size: 11.5px; font-weight: 700; padding: 2px 6px 2px 3px; border-radius: 999px; }
  .kpi-delta.up { color: var(--green); background: var(--green-bg); }
  .kpi-delta.down { color: var(--amber); background: var(--amber-bg); }
  .kpi-sub { font-size: 11.5px; color: var(--muted); font-weight: 500; }
  .kpi-sub b { color: var(--ink-2); }
  .kpi-filter-hint { position: absolute; top: 14px; right: 12px; color: var(--muted); opacity: 0; transition: opacity .14s, transform .14s; }
  .kpi:hover .kpi-filter-hint { opacity: .7; transform: translateX(2px); }

  /* ---------------- cards + grids ---------------- */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); box-shadow: var(--sh); }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 17px 20px 12px; }
  .card-title { font-size: 15.5px; font-weight: 800; letter-spacing: -.3px; white-space: nowrap; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ghost-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); border: 1px solid var(--line); padding: 6px 11px; border-radius: 9px; white-space: nowrap; transition: all .13s; }
  .ghost-btn:hover { border-color: #C9D6F2; color: var(--primary); }
  .grid-a { display: grid; grid-template-columns: 1.85fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-b { display: grid; grid-template-columns: 1.85fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-map { display: grid; grid-template-columns: 1.9fr 1fr; gap: 16px; margin-bottom: 16px; }
  .map-count { font-size: 12.5px; font-weight: 800; color: var(--ink); white-space: nowrap; }
  .map-count span { color: var(--muted); font-weight: 600; font-size: 11.5px; }

  /* ---------------- map ---------------- */
  .map-frame { padding: 0 20px 18px; }
  .map-bare { padding: 0; }
  .map-el { width: 100%; border-radius: 13px; overflow: hidden; border: 1px solid var(--line); background: #EAEFF6; }
  .leaflet-container { font-family: inherit; background: #EAEFF6; }
  .mk-wrap { background: none; border: none; }
  .mk { display: block; width: 16px; height: 16px; border-radius: 50%; background: var(--mk); border: 3px solid #fff; box-shadow: 0 2px 5px rgba(14,23,38,.4); }
  .mk-hotel { box-shadow: 0 2px 5px rgba(14,23,38,.4), 0 0 0 3px rgba(79,70,229,.35); }
  .leaflet-tooltip { border: none; box-shadow: var(--sh-pop); border-radius: 9px; font-size: 12px; padding: 6px 9px; color: var(--ink); font-weight: 500; }
  .leaflet-tooltip b { font-weight: 700; }
  .map-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 13px; font-size: 11.5px; font-weight: 600; color: var(--ink-2); }
  .map-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .map-legend .lg { width: 9px; height: 9px; border-radius: 50%; }
  .map-legend .lg-ring { width: 9px; height: 9px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 2px rgba(79,70,229,.5); }

  /* ---------------- exceptions ---------------- */
  .exc-card { display: flex; flex-direction: column; }
  .exc-count { font-size: 11.5px; font-weight: 700; color: var(--amber); background: var(--amber-bg); padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .exc-list { padding: 2px 12px 14px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .exc-row { display: flex; align-items: center; gap: 11px; width: 100%; padding: 9px 8px; border-radius: 11px; text-align: left; transition: background .12s; }
  .exc-row:hover { background: var(--line-2); }
  .exc-bar { width: 3px; height: 30px; border-radius: 3px; flex-shrink: 0; }
  .exc-av { width: 34px; height: 34px; border-radius: 10px; background: var(--line-2); color: var(--ink-2); font-weight: 700; font-size: 11.5px; display: grid; place-items: center; flex-shrink: 0; }
  .exc-info { flex: 1; min-width: 0; }
  .exc-name { display: block; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exc-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .exc-go { color: var(--muted); display: inline-flex; }
  .exc-empty { padding: 40px 20px; text-align: center; color: var(--green); }
  .exc-empty-t { font-size: 15px; font-weight: 800; color: var(--ink); margin-top: 8px; }
  .exc-empty-s { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

  /* ---------------- CTS ---------------- */
  .cts-total { text-align: right; }
  .cts-total-pct { display: block; font-size: 19px; font-weight: 800; color: var(--primary); letter-spacing: -.5px; }
  .cts-total-lbl { font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .cts-list { padding: 4px 20px 16px; }
  .cts-row { display: grid; grid-template-columns: 132px 1fr 48px 92px auto; align-items: center; gap: 14px; padding: 8px 0; border-bottom: 1px solid var(--line-2); }
  .cts-row:last-child { border-bottom: none; }
  .cts-country { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .cts-bar { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .cts-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.2,.8,.2,1); }
  .cts-fill.on { background: linear-gradient(90deg, var(--primary), #5B8DEF); }
  .cts-fill.behind { background: linear-gradient(90deg, var(--amber), #EBA94A); }
  .cts-pct { font-size: 13.5px; font-weight: 800; text-align: right; font-variant-numeric: tabular-nums; }
  .cts-detail { font-size: 11px; color: var(--muted); font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
  .cts-tag { font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 999px; white-space: nowrap; text-align: center; }
  .cts-tag.on { color: var(--green); background: var(--green-bg); }
  .cts-tag.behind { color: var(--amber); background: var(--amber-bg); }

  /* ---------------- rankings ---------------- */
  .rank-ico { color: var(--amber); display: inline-flex; }
  .rank-list { padding: 2px 18px 16px; }
  .rank-row { display: flex; align-items: center; gap: 11px; padding: 9px 2px; border-bottom: 1px solid var(--line-2); }
  .rank-row:last-child { border-bottom: none; }
  .rank-pos { font-size: 13px; font-weight: 800; width: 14px; text-align: center; }
  .rank-av { width: 34px; height: 34px; border-radius: 10px; background: var(--primary-soft); color: var(--primary); font-weight: 700; font-size: 11.5px; display: grid; place-items: center; flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-bar { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .rank-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #6CA0F5); border-radius: 999px; }
  .rank-km { font-size: 13.5px; font-weight: 800; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .rank-km span { font-size: 10.5px; font-weight: 600; color: var(--muted); margin-left: 2px; }

  /* ---------------- table ---------------- */
  .table-card { overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  .dtable { width: 100%; border-collapse: collapse; min-width: 900px; }
  .dtable th { text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 9px 16px; background: var(--line-2); cursor: pointer; white-space: nowrap; user-select: none; }
  .dtable th:first-child { padding-left: 20px; }
  .dtable th span, .dtable th svg { vertical-align: middle; }
  .dtable th svg { margin-left: 3px; opacity: .4; }
  .dtable th.sorted { color: var(--primary); }
  .dtable th.sorted svg { opacity: 1; }
  .dtable td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--line-2); white-space: nowrap; }
  .dtable td:first-child { padding-left: 20px; }
  .dtable tbody tr { transition: background .1s; cursor: pointer; }
  .dtable tbody tr:hover { background: var(--primary-soft); }
  .dtable tbody tr:last-child td { border-bottom: none; }
  .td-driver { display: flex; align-items: center; gap: 10px; }
  .td-av { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg,#E2EAFB,#EFF4FF); color: var(--primary); font-weight: 700; font-size: 11px; display: grid; place-items: center; flex-shrink: 0; }
  .td-name { display: block; font-weight: 700; }
  .td-plate { display: block; font-size: 10.5px; color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
  .cc { font-size: 9.5px; font-weight: 800; color: var(--ink-2); background: var(--line-2); padding: 2px 5px; border-radius: 5px; margin-right: 7px; letter-spacing: .3px; }
  .muted { color: var(--muted); }
  .stale { color: var(--amber); font-weight: 700; }
  .save { color: var(--green); font-weight: 700; }
  .hm-yes { display: inline-flex; align-items: center; gap: 3px; color: var(--green); font-weight: 700; }
  .base-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 999px; }
  .base-pill.home { background: var(--line-2); color: var(--ink-2); }
  .base-pill.hotel { background: var(--indigo-bg); color: var(--indigo); }
  .status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
  .status-pill .sp-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-pill.ok { background: var(--green-bg); color: var(--green); }
  .status-pill.warn { background: var(--amber-bg); color: var(--amber); }
  .status-pill.danger { background: var(--red-bg); color: var(--red); }
  .status-pill.neutral { background: var(--line-2); color: var(--ink-2); }
  .table-foot { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; font-size: 12.5px; font-weight: 600; color: var(--muted); border-top: 1px solid var(--line-2); }

  /* ---------------- driver detail (slide-over) ---------------- */
  .dp-backdrop { position: fixed; inset: 0; background: rgba(14,23,38,.4); backdrop-filter: blur(2px); z-index: 2000; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; } }
  .dp { position: fixed; top: 0; right: 0; height: 100vh; width: 432px; max-width: 94vw; background: var(--surface); z-index: 2050; display: flex; flex-direction: column; box-shadow: var(--sh-lg); animation: slide .24s cubic-bezier(.2,.8,.2,1); }
  @keyframes slide { from { transform: translateX(100%); } }
  .dp-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 20px 14px; border-bottom: 1px solid var(--line); }
  .dp-head-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .dp-av { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg,#2563EB,#60A5FA); color: #fff; font-weight: 700; font-size: 15px; display: grid; place-items: center; flex-shrink: 0; }
  .dp-av.lg { width: 48px; height: 48px; }
  .dp-name { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .dp-sub { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .dp-close { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; color: var(--ink-2); border: 1px solid var(--line); flex-shrink: 0; }
  .dp-close:hover { background: var(--line-2); }
  .dp-statusbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--line-2); }
  .dp-checkin { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .dp-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
  .dp-map { height: 150px; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); margin-bottom: 14px; }
  .dp-metric { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: linear-gradient(120deg, #EEF3FF, #F6F9FF); border: 1px solid #DEE9FC; border-radius: 13px; margin-bottom: 16px; }
  .dp-metric-lbl { font-size: 11px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: .4px; }
  .dp-metric-val { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-top: 2px; }
  .dp-metric-val small { font-size: 14px; font-weight: 700; color: var(--muted); }
  .dp-class { font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 999px; }
  .dp-class.good { color: var(--green); background: var(--green-bg); }
  .dp-class.mid { color: var(--primary); background: var(--primary-soft); }
  .dp-class.warn { color: var(--amber); background: var(--amber-bg); }
  .dp-sec { margin-bottom: 18px; }
  .dp-sec-title { display: flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--ink-2); margin-bottom: 9px; }
  .dp-sec-title svg { color: var(--muted); }
  .info-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--line-2); }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 12.5px; color: var(--ink-2); font-weight: 500; }
  .info-value { font-size: 12.5px; font-weight: 600; text-align: right; }
  .info-value.strong { font-weight: 800; }
  .info-value .small { font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
  .dp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .dp-stat { background: var(--line-2); border-radius: 11px; padding: 11px 12px; text-align: center; }
  .dp-stat span { display: block; font-size: 18px; font-weight: 800; letter-spacing: -.5px; }
  .dp-stat label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; }
  .warn-num { color: var(--amber); }
  .gpill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: var(--green-bg); color: var(--green); }
  .gpill.idle { background: var(--amber-bg); color: var(--amber); }
  .gpill.hold { background: var(--red-bg); color: var(--red); }
  .qc-good { color: var(--green); } .qc-mid { color: var(--primary); } .qc-low { color: var(--amber); }
  .veh { font-weight: 700; } .veh.ok { color: var(--green); } .veh.minor { color: var(--amber); } .veh.critical { color: var(--red); }
  .dp-hist { display: flex; flex-direction: column; gap: 3px; }
  .dp-hist-row { display: flex; align-items: center; gap: 11px; padding: 5px 0; }
  .dp-hist-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); border: 2px solid #CBD5E6; flex-shrink: 0; }
  .dp-hist-m { font-size: 12.5px; font-weight: 700; }
  .dp-hist-c { font-size: 11px; color: var(--muted); font-weight: 500; }
  .dp-profile { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 11px; font-size: 13px; font-weight: 700; color: var(--primary); text-decoration: none; transition: background .13s; }
  .dp-profile:hover { background: var(--primary-soft); }

  /* ---------------- modal / admin ---------------- */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(14,23,38,.45); backdrop-filter: blur(3px); z-index: 2200; display: grid; place-items: center; padding: 28px; animation: fade .18s ease; }
  .modal { background: var(--surface); border-radius: 18px; box-shadow: var(--sh-lg); width: 100%; max-width: 760px; max-height: 86vh; display: flex; flex-direction: column; overflow: hidden; animation: modalin .2s cubic-bezier(.2,.8,.2,1); }
  @keyframes modalin { from { opacity: 0; transform: translateY(12px) scale(.98); } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
  .modal-title { font-size: 17px; font-weight: 800; }
  .modal-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .admin-body { display: grid; grid-template-columns: 264px 1fr; min-height: 0; flex: 1; }
  .admin-list-col { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
  .admin-search { display: flex; align-items: center; gap: 8px; margin: 12px; padding: 8px 11px; border: 1px solid var(--line); border-radius: 9px; color: var(--muted); }
  .admin-search input { border: none; outline: none; flex: 1; font-size: 13px; color: var(--ink); }
  .admin-list { overflow-y: auto; padding: 0 8px 10px; flex: 1; }
  .admin-li { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 10px; border-radius: 10px; text-align: left; }
  .admin-li:hover { background: var(--line-2); }
  .admin-li.on { background: var(--primary-soft); }
  .admin-li-av { width: 32px; height: 32px; border-radius: 9px; background: var(--line-2); color: var(--ink-2); font-weight: 700; font-size: 11px; display: grid; place-items: center; flex-shrink: 0; }
  .admin-li.on .admin-li-av { background: #fff; color: var(--primary); }
  .admin-li-name { display: block; font-size: 13px; font-weight: 700; }
  .admin-li-meta { display: flex; align-items: center; font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .admin-form { padding: 20px 22px; overflow-y: auto; }
  .admin-form-head { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
  .admin-field { margin-bottom: 14px; }
  .admin-field label { display: block; font-size: 11.5px; font-weight: 700; color: var(--ink-2); margin-bottom: 6px; }
  .admin-field input, .admin-field textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-size: 13px; color: var(--ink); outline: none; resize: vertical; }
  .admin-field input:focus, .admin-field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .admin-seg { display: flex; gap: 8px; }
  .admin-seg button { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 12.5px; font-weight: 600; padding: 9px; border: 1px solid var(--line); border-radius: 9px; color: var(--ink-2); }
  .admin-seg button.on { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .admin-actions { display: flex; align-items: center; justify-content: flex-end; gap: 9px; margin-top: 18px; }
  .admin-saved { margin-right: auto; display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 700; color: var(--green); }
  .btn-ghost { font-size: 13px; font-weight: 700; color: var(--ink-2); padding: 9px 16px; border-radius: 9px; border: 1px solid var(--line); }
  .btn-primary { font-size: 13px; font-weight: 700; color: #fff; background: var(--primary); padding: 9px 18px; border-radius: 9px; box-shadow: 0 8px 18px -8px rgba(37,99,235,.6); }
  .btn-primary:hover { background: var(--primary-700); }

  /* ---------------- expenses ---------------- */
  .exp-top { display: grid; grid-template-columns: 1fr 1.6fr; gap: 16px; margin-bottom: 16px; }
  .exp-total { padding: 22px; display: flex; flex-direction: column; justify-content: center; }
  .exp-total-lbl { font-size: 12.5px; font-weight: 700; color: var(--ink-2); }
  .exp-total-val { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; margin: 4px 0 8px; }
  .exp-total-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: var(--green); }
  .exp-cats { padding: 4px 20px 18px; }
  .exp-cat { display: grid; grid-template-columns: 14px 120px 1fr 60px; align-items: center; gap: 12px; padding: 8px 0; }
  .exp-cat-dot { width: 11px; height: 11px; border-radius: 4px; }
  .exp-cat-dot.tone-blue { background: var(--primary); } .exp-cat-dot.tone-indigo { background: var(--indigo); } .exp-cat-dot.tone-amber { background: var(--amber); } .exp-cat-dot.tone-green { background: var(--green); } .exp-cat-dot.tone-red { background: var(--red); }
  .exp-cat-name { font-size: 13px; font-weight: 600; }
  .exp-cat-bar { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .exp-cat-fill { display: block; height: 100%; border-radius: 999px; }
  .exp-cat-fill.tone-blue { background: var(--primary); } .exp-cat-fill.tone-indigo { background: var(--indigo); } .exp-cat-fill.tone-amber { background: var(--amber); } .exp-cat-fill.tone-green { background: var(--green); } .exp-cat-fill.tone-red { background: var(--red); }
  .exp-cat-val { font-size: 13px; font-weight: 800; text-align: right; font-variant-numeric: tabular-nums; }

  /* ---------------- recruitment / mini stats + funnel ---------------- */
  .mini-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .mini-card { position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); box-shadow: var(--sh); padding: 18px 18px 16px; }
  .mini-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .mini-bar.tone-blue { background: var(--primary); } .mini-bar.tone-indigo { background: var(--indigo); } .mini-bar.tone-green { background: var(--green); } .mini-bar.tone-amber { background: var(--amber); }
  .mini-val { font-size: 27px; font-weight: 800; letter-spacing: -1px; }
  .mini-lbl { font-size: 12px; font-weight: 600; color: var(--ink-2); margin-top: 2px; }
  .funnel { padding: 8px 20px 18px; }
  .fun-row { display: grid; grid-template-columns: 92px 1fr 40px; align-items: center; gap: 12px; padding: 9px 0; }
  .fun-lbl { font-size: 12.5px; font-weight: 700; color: var(--ink-2); }
  .fun-track { height: 12px; background: var(--line-2); border-radius: 7px; overflow: hidden; }
  .fun-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #5B8DEF); border-radius: 7px; }
  .fun-val { font-size: 13.5px; font-weight: 800; text-align: right; font-variant-numeric: tabular-nums; }

  .foot { text-align: center; color: var(--muted); font-size: 11.5px; margin-top: 22px; }

  /* ---------------- responsive ---------------- */
  @media (max-width: 1200px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .grid-a, .grid-b, .grid-map, .exp-top { grid-template-columns: 1fr; }
    .mini-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 880px) {
    .sidebar { display: none; }
    .content { padding: 18px 14px 32px; }
    .topbar { padding: 10px 14px; gap: 8px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .tool-btn span, .search-kbd, .user-meta { display: none; }
    .searchbox { width: auto; flex: 1; }
  }
  @media (max-width: 560px) { .kpi-row { grid-template-columns: 1fr; } }

  /* ====================================================================
     DARK MODE — paleta slate, ativada por <html data-theme="dark">.
     Espelha o tom do theme.css do portal (slate-900) mas pras vars
     próprias do mockup. Sincroniza com as páginas embedadas (mesmo
     localStorage.AC_THEME), então a shell e os iframes escurecem juntos.
     ==================================================================== */
  :root[data-theme="dark"] {
    --bg: #0B1120; --surface: #151E32;
    --ink: #E8EDF6; --ink-2: #AEB9CE; --muted: #6E7B93;
    --line: #263247; --line-2: #1A2336;
    --primary: #3B82F6; --primary-700: #2563EB; --primary-soft: #18233C;
    --nav-bg: #090E1B; --nav-line: rgba(255,255,255,.07); --nav-txt: #9AA7BE; --nav-txt-dim: #5C6987;
    --green: #34D399; --green-bg: rgba(52,211,153,.14);
    --amber: #FBBF24; --amber-bg: rgba(251,191,36,.15);
    --red: #F87171;   --red-bg: rgba(248,113,113,.15);
    --indigo: #818CF8; --indigo-bg: rgba(129,140,248,.16);
    --sh-sm: 0 1px 2px rgba(0,0,0,.4);
    --sh: 0 1px 2px rgba(0,0,0,.35), 0 10px 24px -16px rgba(0,0,0,.7);
    --sh-lg: 0 20px 50px -22px rgba(0,0,0,.8);
    --sh-pop: 0 14px 40px -10px rgba(0,0,0,.7);
    color-scheme: dark;
  }
  :root[data-theme="dark"] ::selection { background: #1E3A5F; color: #fff; }

  /* topbar tem bg rgba claro hardcoded */
  :root[data-theme="dark"] .topbar { background: rgba(11,17,32,.82); }

  /* borders de hover hardcoded claros */
  :root[data-theme="dark"] .tool-btn:hover,
  :root[data-theme="dark"] .chip:hover,
  :root[data-theme="dark"] .ghost-btn:hover { border-color: var(--primary); }

  /* chip ativo era var(--ink)+texto branco → vira azul no dark */
  :root[data-theme="dark"] .chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* avatar/célula com gradiente claro */
  :root[data-theme="dark"] .td-av { background: #1E3A5F; color: #9CC3FF; }
  :root[data-theme="dark"] .admin-li.on .admin-li-av { background: var(--surface); color: var(--primary); }

  /* dp-metric: gradiente azul claro → azul escuro */
  :root[data-theme="dark"] .dp-metric { background: linear-gradient(120deg, #16233C, #121A2C); border-color: #24395C; }
  :root[data-theme="dark"] .dp-class.mid { background: var(--primary-soft); }

  /* item destacado do menu de export (amarelo claro) */
  :root[data-theme="dark"] .exp-item.hi .exp-ico { background: rgba(251,191,36,.16); color: var(--amber); }

  /* bordas claras pontuais */
  :root[data-theme="dark"] .filter-flag { border-color: #24395C; }
  :root[data-theme="dark"] .dp-hist-dot { background: var(--line); border-color: var(--line-2); }

  /* mapa: tiles claros do Carto invertidos + chrome do Leaflet no escuro */
  :root[data-theme="dark"] .map-el,
  :root[data-theme="dark"] .leaflet-container { background: #0E1726; }
  :root[data-theme="dark"] .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(.92) contrast(.9); }
  :root[data-theme="dark"] .leaflet-tooltip { background: var(--surface); color: var(--ink); box-shadow: var(--sh-pop); }
  :root[data-theme="dark"] .leaflet-control-attribution { background: rgba(11,17,32,.72) !important; color: var(--muted) !important; }
  :root[data-theme="dark"] .leaflet-control-attribution a { color: var(--primary) !important; }
  :root[data-theme="dark"] .leaflet-bar a { background: var(--surface); color: var(--ink); border-color: var(--line); }
  :root[data-theme="dark"] .leaflet-bar a:hover { background: var(--line-2); }

  /* ====================================================================
     EMBED — abas que incorporam as páginas reais via iframe (paginazona)
     ==================================================================== */
  .content-embed { max-width: none; padding: 14px 22px 18px; }
  .embed-wrap { display: flex; flex-direction: column; height: calc(100vh - 116px); min-height: 520px; border: 1px solid var(--line); border-radius: var(--r-card); overflow: hidden; background: var(--surface); box-shadow: var(--sh); }
  .embed-bar { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--line); background: var(--surface); }
  .embed-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(52,211,153,.18); flex-shrink: 0; }
  .embed-src { font-size: 12px; font-weight: 600; color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .embed-ext { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--primary); text-decoration: none; border: 1px solid var(--line); padding: 6px 11px; border-radius: 9px; transition: all .13s; white-space: nowrap; }
  .embed-ext:hover { background: var(--primary-soft); border-color: var(--primary); }
  .embed-frame { flex: 1; width: 100%; border: none; background: var(--surface); }
  .embed-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; color: var(--indigo); background: var(--indigo-bg); padding: 4px 10px; border-radius: 999px; }

  /* indicador "↗" nos itens de nav que abrem páginas reais */

    setTimeout(() => map.invalidateSize(), 150);
  }, []);

    <div className="map-legend">
      <span><i className="lg" style={{ background: "#16A34A" }} />{t("legendRecent")}</span>
      <span><i className="lg" style={{ background: "#D97706" }} />{t("legendOld")}</span>

  return (
    <section className="card map-card">
      <div className="card-head">
        <div><div className="card-title">{t("mapTitle")}</div><div className="card-sub">{t("mapSub")}</div></div>

/* ============================================================
   CTS card
   ============================================================ */
function CtsCard({ t, compact = false }) {
  const rows = window.DASH.CTS.map((c) => ({ ...c, pct: Math.round((c.done / c.goal) * 100) }));
  const tDone = rows.reduce((s, r) => s + r.done, 0), tGoal = rows.reduce((s, r) => s + r.goal, 0);
  const tPct = Math.round((tDone / tGoal) * 100);
  return (
    <section className={"card cts-card" + (compact ? " compact" : "")}>
      <div className="card-head">
        <div><div className="card-title">{t("ctsTitle")}</div><div className="card-sub">{t("ctsSub")}</div></div>
        <div className="cts-total"><span className="cts-total-pct">{tPct}%</span><span className="cts-total-lbl">{t("ctsTotal")}</span></div>
      </div>
      <div className="cts-list">
        {rows.map((c) => {
          const on = c.pct >= 70;
          return (
            <div className="cts-row" key={c.cc}>
              <div className="cts-country"><CC cc={c.cc} />{c.country}</div>
              <div className="cts-bar"><div className={"cts-fill " + (on ? "on" : "behind")} style={{ width: c.pct + "%" }} /></div>
              <div className="cts-pct">{c.pct}%</div>
              <div className="cts-detail">{(c.done / 1000).toFixed(1)}k / {(c.goal / 1000).toFixed(0)}k</div>
              <span className={"cts-tag " + (on ? "on" : "behind")}>{on ? t("ctsOnTrack") : t("ctsBehind")}</span>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ============================================================
   Ranking card — type: "km" | "eff"
   ============================================================ */
function RankingCard({ t, type = "km" }) {
  const base = [...window.DASH.DRIVERS];
  const list = type === "km"
    ? base.sort((a, b) => b.km - a.km).slice(0, 6)
    : base.sort((a, b) => a.distBase - b.distBase).slice(0, 6);
  const max = type === "km" ? list[0].km : Math.max(...list.map((d) => d.distBase));
  const medal = ["#D9A441", "#9AA6B8", "#B9824E"];
  return (
    <section className="card rank-card">
      <div className="card-head">
        <div><div className="card-title">{t(type === "km" ? "rankKmTitle" : "rankEffTitle")}</div><div className="card-sub">{t(type === "km" ? "rankKmSub" : "rankEffSub")}</div></div>
        <span className="rank-ico"><Icon name={type === "km" ? "trophy" : "leaf"} size={17} /></span>
      </div>
      <div className="rank-list">
        {list.map((d, i) => {
          const val = type === "km" ? d.km : d.distBase;
          const w = type === "km" ? (d.km / max) * 100 : (1 - d.distBase / (max * 1.1)) * 100;
          return (
            <div className="rank-row" key={d.id}>
              <div className="rank-pos" style={{ color: medal[i] || "#C3CCDA" }}>{i + 1}</div>
              <div className="rank-av">{initials(d.name)}</div>
              <div className="rank-info">
                <div className="rank-name">{d.name}</div>
                <div className="rank-bar"><div className="rank-fill" style={{ width: Math.max(8, w) + "%" }} /></div>
              </div>
              <div className="rank-km">{type === "km" ? val : val.toFixed(1)}<span>{t("rankUnit")}</span></div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ============================================================
   Drivers table
   ============================================================ */
function DriversTable({ t, drivers, onSelect, full = false }) {
  const [sort, setSort] = React.useState({ key: "km", dir: "desc" });
  const rows = [...drivers].sort((a, b) => {
    const dir = sort.dir === "asc" ? 1 : -1;
    let va = a[sort.key], vb = b[sort.key];
    if (va === null) va = -1; if (vb === null) vb = -1;
    if (typeof va === "string") return va.localeCompare(vb) * dir;
    return (va - vb) * dir;
  });
  const toggle = (k) => setSort((s) => s.key === k ? { key: k, dir: s.dir === "asc" ? "desc" : "asc" } : { key: k, dir: "desc" });
  const cols = [
    { key: "name", l: "thDriver" }, { key: "country", l: "thCountry" }, { key: "city", l: "thCity" },
    { key: "base", l: "thBase" }, { key: "hm", l: "thHm" }, { key: "checkin", l: "thCheckin" },
    { key: "km", l: "thKm" }, { key: "savings", l: "thSavings" }, { key: "status", l: "thStatus" },
  ];
  const shown = full ? rows : rows.slice(0, 8);
  return (
    <section className="card table-card">
      <div className="card-head">
        <div><div className="card-title">{t("tableTitle")}</div><div className="card-sub">{t("tableSub")}</div></div>
        <span className="map-count">{rows.length} <span>{t("drivers")}</span></span>
      </div>
      <div className="table-scroll">
        <table className="dtable">
          <thead><tr>
            {cols.map((c) => (
              <th key={c.key} onClick={() => toggle(c.key)} className={sort.key === c.key ? "sorted" : ""}>
                <span>{t(c.l)}</span><Icon name="sort" size={12} />
              </th>
            ))}
          </tr></thead>
          <tbody>
            {shown.map((d) => {
              const sm = STATUS_META[d.status];
              return (
                <tr key={d.id} onClick={() => onSelect(d)}>
                  <td><div className="td-driver"><div className="td-av">{initials(d.name)}</div><div><span className="td-name">{d.name}</span><span className="td-plate">{d.plate}</span></div></div></td>
                  <td><CC cc={d.cc} />{d.country}</td>
                  <td className="muted">{d.city.split(",")[0]}</td>
                  <td><span className={"base-pill " + d.base}><Icon name={d.base === "hotel" ? "hotel" : "home"} size={13} />{t(d.base === "hotel" ? "baseHotel" : "baseHome")}</span></td>
                  <td>{d.hm ? <span className="hm-yes"><Icon name="check" size={13} />{t("yes")}</span> : <span className="muted">{t("no")}</span>}</td>
                  <td className={d.checkin > 24 ? "stale" : "muted"}>{checkinLabel(t, d.checkin)}</td>
                  <td className="num">{d.km}</td>
                  <td className="num">{d.savings ? <span className="save">+{d.savings}</span> : <span className="muted">—</span>}</td>
                  <td><span className={"status-pill " + sm.cls}><i className="sp-dot" style={{ background: sm.dot }} />{t(sm.k)}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {!full && rows.length > 8 && <div className="table-foot"><span>{shown.length} / {rows.length}</span><button className="ghost-btn">{t("showAll")} <Icon name="arrow" size={14} /></button></div>}
    </section>
  );
}

            <Row label={t("dpQc")} strong><span className={d.qc >= 90 ? "qc-good" : d.qc >= 80 ? "qc-mid" : "qc-low"}>{d.qc}</span></Row>

function PayrollPage({ t, ctx }) {
  const fmt = (n) => "$" + Math.round(n).toLocaleString("en-US");
  const rows = ctx.drivers.map((d) => {
    const rate = window.DASH.PAY_RATES[d.country] || 22;
    const hours = d.mapDays * 8 + (d.id.charCodeAt(1) % 5);
    return { ...d, rate, hours, gross: hours * rate };
  }).sort((a, b) => b.gross - a.gross);
  const total = rows.reduce((s, r) => s + r.gross, 0);
  const byCountry = {};
  rows.forEach((r) => { byCountry[r.cc] = byCountry[r.cc] || { cc: r.cc, country: r.country, value: 0 }; byCountry[r.cc].value += r.gross; });
  const bc = Object.values(byCountry).sort((a, b) => b.value - a.value);
  const maxBc = bc.length ? bc[0].value : 1;
  return (
    <>
      <PageHead t={t} title={t("pgPayTitle")} sub={t("pgPaySub")} country={ctx.country} kpiFilter={ctx.kpiFilter} onClear={ctx.clearFilters} />
      <FilterBar t={t} country={ctx.country} setCountry={ctx.setCountry} />
      <div className="exp-top">

        </div>
        <section className="card">
          <div className="card-head"><div className="card-title">{t("payByCountry")}</div></div>
          <div className="cts-list">
            {bc.map((c) => (
              <div className="cts-row" key={c.cc} style={{ gridTemplateColumns: "132px 1fr 84px auto" }}>
                <div className="cts-country"><CC cc={c.cc} />{c.country}</div>
                <div className="cts-bar"><div className="cts-fill on" style={{ width: (c.value / maxBc) * 100 + "%" }} /></div>
                <div className="cts-pct">{fmt(c.value)}</div>

/* ============================================================
   Embed — incorpora páginas reais do portal como abas (iframe).
   Esconde o topbar interno delas pra virar "uma paginazona" só,
   e sincroniza o dark mode (mesmo localStorage.AC_THEME).
   Como tudo é same-origin (GitHub Pages), o iframe auto-loga via
   sessão e compartilha localStorage com a shell.
   ============================================================ */
function EmbedFrame({ src, title }) {
  const ref = React.useRef(null);
  const onLoad = () => {
    try {
      const d = ref.current && ref.current.contentDocument;
      if (!d) return;
      const dark = document.documentElement.getAttribute("data-theme") === "dark";
      if (dark) d.documentElement.setAttribute("data-theme", "dark");
      else d.documentElement.removeAttribute("data-theme");
      if (!d.getElementById("sv-embed-style")) {
        const st = d.createElement("style");
        st.id = "sv-embed-style";
        // esconde o topbar/botão de tema próprios da página → visual unificado
        st.textContent = ".ac-topbar{display:none!important;} .theme-toggle-btn{display:none!important;}";
        (d.head || d.documentElement).appendChild(st);
      }
    } catch (e) { /* cross-origin ou ainda não pronto — ignora */ }
  };
  return (
    <div className="embed-wrap">
      <div className="embed-bar">
        <span className="embed-dot" />
        <span className="embed-src">{src}</span>
        <a className="embed-ext" href={src} target="_blank" rel="noopener noreferrer"><Icon name="ext" size={14} /> {title}</a>
      </div>
      <iframe ref={ref} className="embed-frame" src={src} title={title} onLoad={onLoad} />
    </div>
  );
}

}

/* ============================================================
   App — router, state, filtros, dark mode, login e embeds
   ============================================================ */
const { useState } = React;

function filterDrivers(drivers, { country, kpi, search }) {
  let r = drivers;
  if (country && country !== "all") r = r.filter((d) => d.country === country);
  if (kpi === "hotel") r = r.filter((d) => d.base === "hotel");
  else if (kpi === "savings") r = r.filter((d) => d.savings > 0);
  else if (kpi === "nocheckin") r = r.filter((d) => d.status === "nocheckin" || d.checkin > 24);
  else if (kpi === "issues") r = r.filter((d) => d.vehicleStatus !== "ok");
  if (search && search.trim()) {
    const q = search.toLowerCase();
    r = r.filter((d) => d.name.toLowerCase().includes(q) || d.city.toLowerCase().includes(q) || d.plate.toLowerCase().includes(q));
  }
  return r;
}

/* Páginas nativas (mockup do redesign, dados de exemplo) */

  home: OverviewPage,
  drivers: DriversPage,
  map: MapPage,
  cts: CtsPage,
  rankings: RankingsPage,

/* Navegação: grupo "Redesign" usa páginas nativas; os outros grupos
   embedam as páginas reais do portal como abas (iframe).
   Pra trocar o alvo de um botão, é só editar o `src` aqui. */

  { labelKey: "grpRedesign", items: [
    { id: "home",     icon: "home",   labelKey: "navHome",     type: "native" },
    { id: "drivers",  icon: "users",  labelKey: "navDrivers",  type: "native" },
    { id: "map",      icon: "map",    labelKey: "navMap",      type: "native" },
    { id: "cts",      icon: "target", labelKey: "navCts",      type: "native" },
    { id: "rankings", icon: "trophy", labelKey: "navRankings", type: "native" },
  ]},
  { labelKey: "grpOps", items: [
    { id: "dashHM",  icon: "grid",     label: "Dashboard HM",    type: "embed", src: "dashboard.html" },
    { id: "profile", icon: "user",     label: "Driver Profile",  type: "embed", src: "driver-profile.html" },
    { id: "scope",   icon: "pin",      label: "Scope / Áreas",   type: "embed", src: "country_scopes.html" },
    { id: "assets",  icon: "car",      label: "Assets",          type: "embed", src: "assets.html" },
  ]},
  { labelKey: "grpFin", items: [
    { id: "payroll", icon: "report",   label: "Payroll & Timesheet", type: "embed", src: "timesheet.html" },
    { id: "funds",   icon: "wallet",   label: "Despesas (Ramp)",     type: "embed", src: "ramp.html" },
    { id: "cash",    icon: "building", label: "Cash AR",             type: "embed", src: "cash.html" },
  ]},
  { labelKey: "grpSys", items: [
    { id: "recruitment", icon: "users",    label: "Recruitment", type: "embed", src: "recruitment.html" },
    { id: "pmo",         icon: "fileText", label: "PMO",         type: "embed", src: "pmo.html" },
    { id: "roadmap",     icon: "layers",   label: "Roadmap",     type: "embed", src: "roadmap.html" },
    { id: "admin",       icon: "sliders",  label: "Admin",       type: "embed", src: "admin.html" },
  ]},
];

const NAV_INDEX = {};
NAV_GROUPS.forEach((g) => g.items.forEach((it) => (NAV_INDEX[it.id] = it)));

function localizedGroups(t) {
  return NAV_GROUPS.map((g) => ({
    label: g.labelKey ? t(g.labelKey) : g.label,
    items: g.items.map((it) => ({ ...it, label: it.labelKey ? t(it.labelKey) : it.label })),
  }));
}

function App({ user }) {
  const [lang, setLang] = useState(() => localStorage.getItem("sv_lang") || "pt");
  const [page, setPage] = useState("home");
  const [country, setCountry] = useState("all");
  const [kpiFilter, setKpiFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [dark, setDark] = useState(() => document.documentElement.getAttribute("data-theme") === "dark");

  const t = (key) => { const I = window.SV_I18N; return (I[lang] && I[lang][key]) || I.pt[key] || key; };
  const changeLang = (l) => { setLang(l); localStorage.setItem("sv_lang", l); };
  const toggleKpi = (f) => setKpiFilter((cur) => (cur === f ? "all" : f));
  const clearFilters = () => { setCountry("all"); setKpiFilter("all"); };

  const toggleDark = () => {
    const next = !dark;
    setDark(next);
    const root = document.documentElement;
    if (next) root.setAttribute("data-theme", "dark");
    else root.removeAttribute("data-theme");
    try { localStorage.setItem("AC_THEME", next ? "dark" : "light"); } catch (e) {}
    // sincroniza iframes abertos (same-origin)
    document.querySelectorAll("iframe.embed-frame").forEach((f) => {
      try {
        const d = f.contentDocument;
        if (!d) return;
        if (next) d.documentElement.setAttribute("data-theme", "dark");
        else d.documentElement.removeAttribute("data-theme");
      } catch (e) {}
    });
  };

  const onLogout = () => { if (typeof aceLogout === "function") aceLogout(t("confirmLogout")); };

  const drivers = filterDrivers(window.DASH.DRIVERS, { country, kpi: kpiFilter, search });
  const ctx = { country, setCountry, kpiFilter, toggleKpi, clearFilters, drivers, select: setSelected, search };

  const item = NAV_INDEX[page] || NAV_INDEX.home;
  const isEmbed = item && item.type === "embed";
  const Native = PAGES_NATIVE[page] || OverviewPage;

  return (
    <div className="app">
      <Sidebar t={t} groups={localizedGroups(t)} active={page} onSelect={(p) => { setPage(p); window.scrollTo({ top: 0 }); }} />
      <main className="main">
        <TopBar
          t={t} lang={lang} setLang={changeLang}
          search={search} setSearch={setSearch}
          period={"today"} setPeriod={() => {}}
          onAdmin={() => setAdminOpen(true)}
          dark={dark} toggleDark={toggleDark}
          user={user} onLogout={onLogout}
        />
        <div className={"content" + (isEmbed ? " content-embed" : "")}>
          {isEmbed
            ? <EmbedPage t={t} item={localizedGroups(t).flatMap((g) => g.items).find((x) => x.id === item.id)} />
            : <Native t={t} ctx={ctx} />}
          {!isEmbed && <footer className="foot">Street View LATAM · Dashboard redesign · mockup hi-fi com dados de exemplo</footer>}
        </div>
      </main>

      {selected && <DriverDetail t={t} driver={selected} onClose={() => setSelected(null)} />}
      {adminOpen && <AdminModal t={t} onClose={() => setAdminOpen(false)} />}
    </div>
  );
}

/* ---- bootstrap: login gate (auth.js + common.js) → monta o app ---- */
function mountApp(user) {
  ReactDOM.createRoot(document.getElementById("root")).render(<App user={user} />);
}

(function gate() {
  if (typeof injectLogin === "function") {
    injectLogin({
      title: "Dashboard · Redesign (teste)",
      sub: "Acesse com suas credenciais do portal",
      lang: "pt",
      onSuccess: mountApp,
    });
  } else {
    mountApp({ username: "guest", fullName: "Convidado" });
  }
})();
