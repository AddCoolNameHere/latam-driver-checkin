<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- LOGIN ---------- */
  .login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #2C5282 0%, #4A9FE0 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 10000;
  }
  .login-card {
    background: var(--c-surface); border-radius: 16px;
    padding: 36px 32px 28px; max-width: 380px; width: 100%;
    box-shadow: 0 20px 60px rgba(15,23,42,0.25); text-align: center;
  }
  .login-logo-img { height: 44px; display: block; margin: 0 auto 18px; }
  .login-title { font-size: 20px; font-weight: 700; color: var(--c-primary-dark); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--c-text-muted); margin-bottom: 24px; }
  .login-card form { text-align: left; }
  .login-card label { display: block; font-size: 11px; font-weight: 600; color: var(--c-text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .login-card input { width: 100%; padding: 11px 14px; border: 1px solid var(--c-border); border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 12px; background: var(--c-surface); color: var(--c-text); }
  .login-card input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(74,159,224,0.15); }
  .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--c-primary), var(--c-accent)); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error { color: var(--c-danger); font-size: 12px; margin-top: 10px; min-height: 16px; display: none; }
  .login-error.visible { display: block; }

  /* ---------- TOPBAR ---------- */
  header.topbar {
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 1px 3px rgba(15,23,42,0.04);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo-img { height: 28px; }
  .brand-divider { width: 1px; height: 22px; background: var(--c-border-strong); }
  .brand-region { font-size: 11px; color: var(--c-text-muted); letter-spacing: 1.3px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .lang-switch { display: flex; gap: 2px; background: var(--c-bg-tint); border-radius: 6px; padding: 2px; }
  .lang-switch button { background: none; border: none; padding: 4px 9px; font-size: 11px; font-weight: 600; color: var(--c-text-muted); cursor: pointer; border-radius: 4px; font-family: inherit; }
  .lang-switch button.active { background: var(--c-surface); color: var(--c-primary-dark); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .user-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px 6px 6px; background: var(--c-bg-tint); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--c-primary-dark); }
  .user-avatar { width: 24px; height: 24px; background: linear-gradient(135deg, var(--c-primary), var(--c-accent)); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .back-link, .pdf-btn, .logout-btn { background: none; border: 1px solid var(--c-border); padding: 6px 12px; border-radius: 8px; font-size: 12px; color: var(--c-text-muted); cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .back-link:hover { background: var(--c-bg-tint); color: var(--c-primary); border-color: var(--c-primary); }
  .pdf-btn { background: var(--c-primary); color: white; border-color: var(--c-primary); font-weight: 600; }
  .pdf-btn:hover { background: var(--c-primary-dark); border-color: var(--c-primary-dark); }
  .logout-btn:hover { background: var(--c-bg); color: var(--c-danger); border-color: var(--c-danger); }

  /* ---------- REPORT HEADER (sóbrio) ---------- */
  .report-header {
    background: linear-gradient(135deg, #0F2443 0%, #1A365D 60%, #2C5282 100%);
    color: white;
    padding: 26px 24px 22px;
    border-bottom: 2px solid var(--c-accent);
  }
  .report-header-inner {
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
  }
  .report-eyebrow {
    font-size: 10px; font-weight: 800; letter-spacing: 2.5px;
    color: #C8DEF0; text-transform: uppercase; margin-bottom: 6px;
  }
  .report-title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.3px; line-height: 1.1;
  }
  .report-subtitle {
    font-size: 12px; color: #C8DEF0;
    margin-top: 4px; font-weight: 500;
  }
  .report-date {
    font-size: 12px; font-weight: 700;
    color: #C8DEF0;
    text-align: right; letter-spacing: 0.5px;
  }
  .report-date strong { color: white; font-size: 16px; display: block; }

  /* ---------- MAIN ---------- */
  main {
    max-width: 1320px; margin: 0 auto;
    padding: 22px 24px 60px;
  }

  /* ---------- KPI ROW ---------- */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi-stripe {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--kpi-color, var(--c-accent));
  }
  .kpi-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--c-text-muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 32px; font-weight: 800;
    color: var(--kpi-color, var(--c-text));
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .kpi-sub {
    font-size: 11px; color: var(--c-text-muted);
    margin-top: 6px;
  }

  /* ---------- TWO-COLUMN (table + map) ---------- */
  .two-col {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
    color: var(--c-primary-dark); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .panel {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* ---------- COUNTRY TABLE ---------- */
  table.country-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.country-table thead {
    background: var(--c-primary-dark);
    color: white;
  }
  table.country-table th {
    text-align: center;
    padding: 10px 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  table.country-table th:first-child { text-align: left; padding-left: 14px; }
  table.country-table td {
    padding: 11px 6px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    border-bottom: 1px solid var(--c-border);
  }
  table.country-table td:first-child {
    text-align: left; padding-left: 14px;
    font-weight: 700; color: var(--c-text);
    display: flex; align-items: center; gap: 8px;
  }
  table.country-table tbody tr:hover td { background: var(--c-bg-tint); cursor: default; }
  table.country-table tbody tr.totals { background: var(--c-bg-tint); font-weight: 800; }
  table.country-table tbody tr.totals td { border-bottom: none; font-size: 13px; color: var(--c-primary-dark); }
  .country-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  td.highlight {
    color: var(--c-accent);
    font-weight: 700;
  }

  /* ---------- MAP ---------- */
  #map {
    height: 100%;
    min-height: 360px;
    background: var(--c-bg);
  }
  .leaflet-container { background: var(--c-bg-tint); }
  .map-legend {
    padding: 8px 14px;
    border-top: 1px solid var(--c-border);
    background: var(--c-bg-tint);
    font-size: 11px;
    color: var(--c-text-muted);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .map-legend strong { color: var(--c-primary-dark); }

  /* ---------- AGING TABLE ---------- */
  .aging-section {
    margin-bottom: 24px;
  }
  table.aging-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table.aging-table thead {
    background: var(--c-primary-dark);
    color: white;
  }
  table.aging-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  table.aging-table td {
    padding: 12px;
    border-bottom: 1px solid var(--c-border);
    font-variant-numeric: tabular-nums;
  }
  table.aging-table tbody tr:hover td { background: var(--c-bg-tint); }
  table.aging-table tbody tr:last-child td { border-bottom: none; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 10px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
    background: var(--pill-bg); color: var(--pill-text);
  }
  .pill-open    { --pill-bg: #DCFCE7; --pill-text: #166534; }
  .pill-hold    { --pill-bg: #FEF3C7; --pill-text: #854D0E; }
  .pill-short   { --pill-bg: #DBEAFE; --pill-text: #1E40AF; }
  .pill-progress{ --pill-bg: #E0E7FF; --pill-text: #3730A3; }
  .days-old {
    color: var(--c-danger);
    font-weight: 800;
  }
  .days-fresh {
    color: var(--c-text-muted);
    font-weight: 600;
  }
  .city-name { font-weight: 700; color: var(--c-text); }
  .remarks-cell { color: var(--c-text-muted); font-style: italic; font-size: 12px; }
  .empty-row td { text-align: center; color: var(--c-text-muted); padding: 40px; font-style: italic; }

  /* ---------- LOADING/ERROR ---------- */
  .loading { text-align: center; padding: 60px 20px; color: var(--c-text-muted); }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--c-border); border-top-color: var(--c-primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #FEE2E2; color: #991B1B;
    padding: 16px 20px; border-radius: 10px;
    font-size: 13px; border: 1px solid #FCA5A5;
  }

  /* ---------- FOOTER ---------- */
  footer.report-footer {
    border-top: 1px solid var(--c-border);
    padding: 14px 24px;
    background: var(--c-bg-tint);
    color: var(--c-text-muted);
    font-size: 11px;
    display: flex; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 980px) {
    .two-col { grid-template-columns: 1fr; }
    #map { min-height: 320px; }
  }
  @media (max-width: 680px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .report-title { font-size: 22px; }
    table.aging-table th:nth-child(6),
    table.aging-table td:nth-child(6) { display: none; }
  }

  /* ---------- PRINT ---------- */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    body { background: white !important; }
    header.topbar, footer.report-footer { display: none !important; }
    .theme-toggle-btn { display: none !important; }
    main { padding: 8px 0; }
    .panel, .kpi-card { box-shadow: none !important; }
    .two-col { gap: 8px; }
    #map { min-height: 280px; }
    table.aging-table tbody tr:hover td { background: transparent !important; }
  }
</style>
</head>

    confirmLogout: 'Sign out?',
    footerLeft: 'Aceolution · Confidential · Internal use',
    footerRight: 'Source: Mastersheet › Recruitment',
  },
};

let currentLang = 'pt';
let currentUser = null;
let recruitmentData = null;
let mapInstance = null;
let mapBubbles = [];

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || I18N.pt[key] || key; }

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  applyI18n();
  if (recruitmentData) renderContent();
}

function applyI18n() {
  document.getElementById('login-title').textContent = t('loginTitle');
  document.getElementById('login-sub').textContent = t('loginSub');
  document.getElementById('login-label-user').textContent = t('labelUser');
  document.getElementById('login-label-pass').textContent = t('labelPass');
  document.getElementById('login-btn').textContent = t('loginBtn');
  document.getElementById('brand-region').textContent = t('region');
  document.getElementById('pdf-btn-label').textContent = t('pdfBtn');
  document.getElementById('back-link').textContent = t('backLink');
  document.getElementById('logout-btn').textContent = t('logoutBtn');
  document.getElementById('report-eyebrow').textContent = t('reportEyebrow');
  document.getElementById('report-title').textContent = t('reportTitle');
  document.getElementById('report-subtitle').textContent = t('reportSubtitle');
  document.getElementById('loading-text').textContent = t('loadingText');
  document.getElementById('footer-left').textContent = t('footerLeft');
  document.getElementById('footer-right').textContent = t('footerRight');
  document.documentElement.lang = currentLang;
}

// ---------- LOGIN ----------
async function doLogin(e) {
  e.preventDefault();
  const u = document.getElementById('login-username').value.trim().toLowerCase();
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  err.classList.remove('visible');
  if (!u || !p) { err.textContent = t('loginErrorEmpty'); err.classList.add('visible'); return false; }
  btn.disabled = true; btn.textContent = '...';
  try {
    const user = await validateLogin(u, p);
    if (!user) {
      await new Promise(r => setTimeout(r, 400));
      err.textContent = t('loginErrorInvalid');
      err.classList.add('visible');
      document.getElementById('login-password').value = '';
      btn.disabled = false; btn.textContent = t('loginBtn');
      return false;
    }
    currentUser = user;
    saveSession(user);
    onLoginSuccess();
  } catch (er) {
    err.textContent = 'Erro: ' + er.message;
    err.classList.add('visible');
    btn.disabled = false; btn.textContent = t('loginBtn');
  }
  return false;
}

function onLoginSuccess() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('user-name').textContent = currentUser.fullName;
  document.getElementById('user-avatar').textContent =
    currentUser.fullName.split(' ').map(s => s[0].toUpperCase()).slice(0, 2).join('');
  if (typeof setupThemeToggle === 'function') setupThemeToggle(currentUser);
  loadData();
}

function doLogout() {
  if (!confirm(t('confirmLogout'))) return;
  clearSession();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = t('loginBtn');
  if (typeof removeThemeToggle === 'function') removeThemeToggle();
}

// ---------- LOAD DATA ----------
async function loadData() {
  try {
    const res = await fetch(CONFIG.scriptUrl + '?action=getRecruitmentData').then(r => r.json());
    if (!res.success) throw new Error(res.error || 'Erro do backend');
    recruitmentData = res.data;
    renderContent();
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">Erro ao carregar dados: ' + escapeHtml(err.message) + '</div>';
  }
}

// ---------- RENDER ----------
function renderContent() {
  if (!recruitmentData) return;
  const demand = recruitmentData.demand || [];
  const summary = recruitmentData.summary || [];
  const summaryByCountry = {};
  summary.forEach(s => { summaryByCountry[s.country] = s; });

  // KPIs
  const totalOpen = demand.length;
  const totalActive = summary.reduce((acc, s) => acc + (s.currentlyActive || 0), 0);
  const totalHired = summary.reduce((acc, s) => acc + (s.hired || 0), 0);
  const stuck = demand.filter(d => {
    const days = computeDaysOpen(d.raisedOn);
    return days !== null && days >= 30;
  }).length;

  // Aging-sorted demand
  const demandWithAge = demand.map(d => ({
    ...d, daysOpen: computeDaysOpen(d.raisedOn)
  })).sort((a, b) => (b.daysOpen || 0) - (a.daysOpen || 0));

  // Update report date
  const now = new Date();
  const locale = currentLang === 'pt' ? 'pt-BR' : currentLang === 'es' ? 'es-ES' : 'en-US';
  document.getElementById('report-date').innerHTML =
    `${t('reportSubtitle').toUpperCase()}<strong>${now.toLocaleDateString(locale, { day: '2-digit', month: 'long', year: 'numeric' })}</strong>`;

  // Build content
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card" style="--kpi-color: #4A9FE0"><div class="kpi-stripe"></div>
        <div class="kpi-label">${t('kpiOpen')}</div>
        <div class="kpi-value">${totalOpen}</div>
        <div class="kpi-sub">${t('kpiOpenSub')}</div></div>
      <div class="kpi-card" style="--kpi-color: #16A34A"><div class="kpi-stripe"></div>
        <div class="kpi-label">${t('kpiActive')}</div>
        <div class="kpi-value">${totalActive}</div>
        <div class="kpi-sub">${t('kpiActiveSub')}</div></div>
      <div class="kpi-card" style="--kpi-color: #2C5282"><div class="kpi-stripe"></div>
        <div class="kpi-label">${t('kpiHired')}</div>
        <div class="kpi-value">${totalHired}</div>
        <div class="kpi-sub">${t('kpiHiredSub')}</div></div>
      <div class="kpi-card" style="--kpi-color: ${stuck > 0 ? '#B91C1C' : '#94A3B8'}"><div class="kpi-stripe"></div>
        <div class="kpi-label">${t('kpiStuck')}</div>
        <div class="kpi-value">${stuck}</div>
        <div class="kpi-sub">${t('kpiStuckSub')}</div></div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-title">${t('sectionByCountry')}</div>
        <div class="panel"><table class="country-table">
          <thead><tr>
            <th>${t('colCountry')}</th>
            <th>${t('colOpen')}</th>
            <th>${t('colShort')}</th>
            <th>${t('colActive')}</th>
            <th>${t('colTraining')}</th>
            <th>${t('colOffboarding')}</th>
          </tr></thead>
          <tbody>
            ${COUNTRY_ORDER.filter(c => summaryByCountry[c]).map(c => {
              const s = summaryByCountry[c];
              const color = COUNTRY_COLOR[c] || 'var(--c-accent)';
              const openCell = (s.open > 0) ? `<td class="highlight">${s.open}</td>` : `<td>${s.open}</td>`;
              const offCell  = (s.offboarding > 0) ? `<td style="color:#CA8A04; font-weight:700;">${s.offboarding}</td>` : `<td>${s.offboarding || 0}</td>`;
              return `<tr>
                <td><span class="country-dot" style="background:${color}"></span>${escapeHtml(c)}</td>
                ${openCell}
                <td>${s.shortlisted}</td>
                <td>${s.currentlyActive}</td>
                <td>${s.training}</td>
                ${offCell}
              </tr>`;
            }).join('')}
            <tr class="totals">
              <td>${t('total').toUpperCase()}</td>
              <td>${totalOpen}</td>
              <td>${summary.reduce((a, s) => a + (s.shortlisted || 0), 0)}</td>
              <td>${totalActive}</td>
              <td>${summary.reduce((a, s) => a + (s.training || 0), 0)}</td>
              <td>${summary.reduce((a, s) => a + (s.offboarding || 0), 0)}</td>
            </tr>
          </tbody>
        </table></div>
      </div>

      <div>
        <div class="section-title">${t('sectionMap')}</div>
        <div class="panel" style="display: flex; flex-direction: column;">
          <div id="map" style="flex:1;"></div>
          <div class="map-legend">
            <span><strong>${t('mapBubbleSize')}:</strong> ${t('equalsOpenPositions')}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="aging-section">
      <div class="section-title">${t('sectionAging')} <span style="color: var(--c-text-muted); font-weight: 600;">(${totalOpen})</span></div>
      <div class="panel"><table class="aging-table">
        <thead><tr>
          <th>${t('colCountry')}</th>
          <th>${t('colCity')}</th>
          <th>${t('colStatus')}</th>
          <th>${t('colRaisedOn')}</th>
          <th>${t('colDaysOpen')}</th>
          <th>${t('colRemarks')}</th>
        </tr></thead>
        <tbody>
          ${demandWithAge.length === 0
            ? `<tr class="empty-row"><td colspan="6">${t('noOpen')}</td></tr>`
            : demandWithAge.map(d => {
                const sk = (d.status || '').toLowerCase();
                let pillCls = 'pill-open', label = t('statusOpen');
                if (sk === 'on hold') { pillCls = 'pill-hold'; label = t('statusOnHold'); }
                else if (sk === 'shortlisted') { pillCls = 'pill-short'; label = t('statusShortlisted'); }
                else if (sk === 'in progress') { pillCls = 'pill-progress'; label = t('statusInProgress'); }
                const isOld = d.daysOpen !== null && d.daysOpen >= 30;
                const color = COUNTRY_COLOR[d.country] || 'var(--c-accent)';
                return `<tr>
                  <td><span class="country-dot" style="background:${color}"></span> ${escapeHtml(d.country)}</td>
                  <td class="city-name">${escapeHtml(d.city || '—')}</td>
                  <td><span class="status-pill ${pillCls}">${label}</span></td>
                  <td>${formatDate(d.raisedOn, locale)}</td>
                  <td class="${isOld ? 'days-old' : 'days-fresh'}">${d.daysOpen !== null ? d.daysOpen + 'd' : '—'}</td>
                  <td class="remarks-cell">${escapeHtml(d.remarks || '—')}</td>
                </tr>`;
              }).join('')
          }
        </tbody>
      </table></div>
    </div>
  `;

  // Build map
  renderMap(summaryByCountry);
}

function renderMap(summaryByCountry) {
  // Destroy existing instance
  if (mapInstance) {
    mapInstance.remove();
    mapInstance = null;
    mapBubbles = [];
  }

  const mapEl = document.getElementById('map');
  if (!mapEl) return;

  mapInstance = L.map(mapEl, {
    zoomControl: true, attributionControl: true,
    scrollWheelZoom: false,
  }).setView([-15, -70], 3);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO',
    subdomains: 'abcd',
    maxZoom: 10,
  }).addTo(mapInstance);

  // Compute max for bubble scaling
  const maxOpen = Math.max(1, ...Object.values(summaryByCountry).map(s => s.open || 0));

  COUNTRY_ORDER.forEach(country => {
    const s = summaryByCountry[country];
    const centroid = COUNTRY_CENTROID[country];
    if (!s || !centroid) return;
    const open = s.open || 0;
    const color = COUNTRY_COLOR[country] || '#4A9FE0';
    const radius = open > 0 ? 12 + (open / maxOpen) * 22 : 8;

    const marker = L.circleMarker(centroid, {
      radius: radius,
      fillColor: color,
      color: 'white',
      weight: 2,
      opacity: 1,
      fillOpacity: open > 0 ? 0.75 : 0.25,
    }).addTo(mapInstance);

    const popupHtml = `
      <div style="font-family: inherit; padding: 4px 2px;">
        <div style="font-weight: 800; color: #1A365D; font-size: 14px; margin-bottom: 6px;">${escapeHtml(country)}</div>
        <div style="font-size: 12px; line-height: 1.6;">
          <div><strong>${open}</strong> ${t('colOpen').toLowerCase()}</div>
          <div><strong>${s.currentlyActive || 0}</strong> ${t('colActive').toLowerCase()}</div>
          <div><strong>${s.hired || 0}</strong> ${t('colHired').toLowerCase()}</div>
        </div>
      </div>
    `;
    marker.bindTooltip(popupHtml, { permanent: false, direction: 'top', opacity: 0.95 });

    // Permanent label with the number (if open > 0)
    if (open > 0) {
      const label = L.divIcon({
        className: 'map-bubble-label',
        html: `<div style="color: white; font-weight: 800; font-size: ${open >= 10 ? 11 : 13}px; text-shadow: 0 1px 2px rgba(0,0,0,0.4); pointer-events: none; text-align: center; width: ${radius*2}px; margin-left: -${radius}px; margin-top: -7px;">${open}</div>`,
        iconSize: [0, 0],
        iconAnchor: [0, 0],
      });
      L.marker(centroid, { icon: label, interactive: false }).addTo(mapInstance);
    }
    mapBubbles.push(marker);
  });

  // Fit LATAM
  mapInstance.fitBounds([[-55, -118], [33, -34]], { padding: [10, 10] });
}

// ---------- HELPERS ----------
function computeDaysOpen(raisedOn) {
  if (!raisedOn) return null;
  let d;
  if (/^\d{4}-\d{2}-\d{2}$/.test(raisedOn)) {
    d = new Date(raisedOn + 'T00:00:00');
  } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(raisedOn)) {
    const [day, mo, yr] = raisedOn.split('/').map(Number);
    d = new Date(yr, mo - 1, day);
  } else {
    d = new Date(raisedOn);
  }
  if (isNaN(d.getTime())) return null;
  const diff = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
  return diff >= 0 ? diff : null;
}

function formatDate(s, locale) {
  if (!s) return '—';
  let d;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) d = new Date(s + 'T00:00:00');
  else if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [day, mo, yr] = s.split('/').map(Number);
    d = new Date(yr, mo - 1, day);
  } else d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return d.toLocaleDateString(locale, { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.addEventListener('DOMContentLoaded', () => {
  applyI18n();
  const saved = loadSession();
  if (saved) { currentUser = saved; onLoginSuccess(); }
});
</script>
