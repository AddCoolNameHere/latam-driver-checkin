<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ============================================================
 * Design tokens (theme_teste.css)
 * ============================================================ */
:root {
  --c-primary:#2C5282; --c-primary-dark:#1A365D; --c-accent:#4A9FE0;
  --c-bg:#F8FAFC; --c-bg-tint:#EBF4FB; --c-surface:#FFFFFF;
  --c-border:#E2E8F0; --c-border-strong:#CBD5E1;
  --c-text:#1A202C; --c-text-muted:#64748B; --c-text-dim:#94A3B8;
  --c-success:#16A34A; --c-warn:#CA8A04; --c-danger:#B91C1C;
  --sv-primary:var(--c-primary); --sv-primary-700:var(--c-primary-dark);
  --sv-primary-soft:var(--c-bg-tint);
  --sv-navy:#0E1830; --sv-navy-line:rgba(255,255,255,.08);
  --sv-navy-txt:#9AA7BE; --sv-navy-dim:#6C7894;
  --sv-bg:#F4F6FA; --sv-line:#E7EAF1; --sv-line-2:#F2F4F9; --sv-card:16px;
  --sv-shadow:0 1px 2px rgba(14,23,38,.04), 0 10px 24px -16px rgba(14,23,38,.20);
  --sv-shadow-lg:0 20px 50px -22px rgba(14,23,38,.34);
}
[data-theme="dark"] {
  --c-primary:#3B82F6; --c-primary-dark:#60A5FA; --c-accent:#0EA5E9;
  --c-bg:#0F172A; --c-bg-tint:#1E3A5F; --c-surface:#1E293B;
  --c-border:#334155; --c-border-strong:#475569;
  --c-text:#F1F5F9; --c-text-muted:#94A3B8; --c-text-dim:#64748B;
  --c-success:#22C55E; --c-warn:#F59E0B; --c-danger:#EF4444;
  --sv-bg:#0F172A; --sv-line:#334155; --sv-line-2:#1E293B; --sv-navy:#0B1220;
  color-scheme:dark;
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:"Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:var(--sv-bg); color:var(--c-text); min-height:100vh; -webkit-font-smoothing:antialiased;
}
body.sv-shell { padding-left:252px; transition:padding-left .18s ease; }
#app-content { padding:22px 28px 40px; min-height:100vh; }

/* ---------- sidebar ---------- */
.sv-sidebar { position:fixed; left:0; top:0; bottom:0; width:252px; z-index:60; background:var(--sv-navy); color:var(--sv-navy-txt); display:flex; flex-direction:column; padding:20px 14px; transition:width .18s ease, transform .22s ease; }
.sv-brand { display:flex; flex-direction:column; align-items:flex-start; gap:8px; padding:4px 8px 18px; margin-bottom:8px; border-bottom:1px solid var(--sv-navy-line); }
.sv-brand-logo { height:30px; width:auto; max-width:170px; filter:brightness(0) invert(1); }
.sv-brand-mark { width:38px; height:38px; border-radius:11px; flex-shrink:0; background:linear-gradient(140deg, var(--c-primary), var(--c-accent)); color:#fff; font-weight:800; font-size:15px; display:none; place-items:center; box-shadow:0 8px 18px -6px rgba(44,82,130,.7); }
.sv-brand-region { font-size:10.5px; font-weight:700; color:#7FA8D6; letter-spacing:1.6px; }
.sv-nav { flex:1; display:flex; flex-direction:column; gap:2px; overflow-y:auto; padding-top:6px; }
.sv-nav-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--sv-navy-dim); padding:12px 12px 7px; }
.sv-nav-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; font-size:13.5px; font-weight:600; color:var(--sv-navy-txt); text-decoration:none; transition:background .14s, color .14s; }
.sv-nav-item .sv-ico { color:var(--sv-navy-dim); display:inline-flex; transition:color .14s; }
.sv-nav-item .sv-ico svg { display:block; }
.sv-nav-item:hover { background:rgba(255,255,255,.05); color:#E7ECF5; }
.sv-nav-item:hover .sv-ico { color:#C3CEE2; }
.sv-nav-item.active { background:linear-gradient(135deg, var(--c-primary), var(--c-accent)); color:#fff; box-shadow:0 10px 22px -12px rgba(44,82,130,.9); }
.sv-nav-item.active .sv-ico { color:#fff; }
.sv-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 10px 4px; border-top:1px solid var(--sv-navy-line); margin-top:6px; }
.sv-foot-status { display:flex; align-items:center; gap:10px; min-width:0; }
.sv-foot-dot { width:8px; height:8px; border-radius:50%; background:#34D399; box-shadow:0 0 0 3px rgba(52,211,153,.18); flex-shrink:0; }
.sv-foot-l1 { font-size:11.5px; font-weight:700; color:#C3CEE2; }
.sv-foot-l2 { font-size:10.5px; color:var(--sv-navy-dim); }
.sv-collapse-btn { flex-shrink:0; width:30px; height:30px; border-radius:8px; background:rgba(255,255,255,.06); border:1px solid var(--sv-navy-line); color:var(--sv-navy-txt); cursor:pointer; display:grid; place-items:center; padding:0; transition:background .14s, color .14s; }
.sv-collapse-btn:hover { background:rgba(255,255,255,.13); color:#fff; }
.sv-collapse-btn svg { display:block; transition:transform .2s ease; }
.sv-burger { display:none; position:fixed; top:12px; left:12px; z-index:56; width:42px; height:42px; border-radius:11px; padding:0; background:var(--c-surface); border:1px solid var(--sv-line); color:var(--c-text); cursor:pointer; place-items:center; box-shadow:var(--sv-shadow); }
.sv-burger svg { display:block; }
.sv-backdrop { position:fixed; inset:0; z-index:55; background:rgba(10,16,30,.5); opacity:0; pointer-events:none; transition:opacity .2s ease; }

/* ---------- page head ---------- */
.sv-pagehead { display:flex; align-items:flex-start; justify-content:space-between; gap:14px 28px; flex-wrap:wrap; margin-bottom:18px; }
.sv-pagehead > div:first-child { flex:1 1 360px; }
.sv-pagehead h1 { line-height:1.12; }
.sv-pagehead h1 { font-size:25px; font-weight:800; letter-spacing:-.6px; color:var(--c-text); }
.sv-pagehead p { font-size:13.5px; color:var(--c-text-muted); margin-top:3px; }
.ph-meta { text-align:right; }
.ph-date { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--c-text-muted); }
.ph-date strong { display:block; font-size:15px; color:var(--c-text); letter-spacing:-.2px; text-transform:none; margin-top:2px; }
.ph-actions { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-left:auto; }
.btn-primary { display:inline-flex; align-items:center; gap:7px; padding:10px 15px; border-radius:10px; border:1px solid var(--sv-primary); background:var(--sv-primary); color:#fff; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; transition:background .14s; }
.btn-primary:hover { background:var(--c-primary-dark); }
.btn-primary svg { display:block; }

/* ---------- KPI scorecards ---------- */
.kpi-row { display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:18px; }
.scorecard { display:flex; align-items:center; gap:13px; background:var(--c-surface); border:1px solid var(--sv-line); border-radius:var(--sv-card); box-shadow:var(--sv-shadow); padding:16px; transition:transform .15s, box-shadow .15s; }
.scorecard:hover { transform:translateY(-3px); box-shadow:var(--sv-shadow-lg); }
.sv-kpi-ico { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; flex-shrink:0; }
.sv-kpi-ico svg { display:block; }
.sv-kpi-ico.tone-blue { background:var(--sv-primary-soft); color:var(--sv-primary); }
.sv-kpi-ico.tone-indigo { background:#ECEDFD; color:#4F46E5; }
.sv-kpi-ico.tone-green { background:#E7F7EE; color:var(--c-success); }
.sv-kpi-ico.tone-amber { background:#FDF1DF; color:var(--c-warn); }
.sv-kpi-ico.tone-red { background:#FCEAEA; color:var(--c-danger); }
[data-theme="dark"] .sv-kpi-ico.tone-indigo { background:#2A2E54; color:#A5B4FC; }
[data-theme="dark"] .sv-kpi-ico.tone-green { background:#10301F; }
[data-theme="dark"] .sv-kpi-ico.tone-amber { background:#3A2E12; }
[data-theme="dark"] .sv-kpi-ico.tone-red { background:#3A1A1A; }
[data-theme="dark"] .sv-kpi-ico { filter:saturate(1.1); }
.sv-kpi-body { min-width:0; flex:1; }
.kpi-label { font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--c-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kpi-value { font-size:26px; font-weight:800; letter-spacing:-1px; color:var(--c-text); line-height:1.1; font-variant-numeric:tabular-nums; margin-top:2px; }
.kpi-sub { font-size:11px; color:var(--c-text-dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ---------- two-col (table + map) ---------- */
.two-col { display:grid; grid-template-columns:minmax(0, 1.05fr) minmax(0, 1fr); gap:16px; margin-bottom:18px; }
.section-card { background:var(--c-surface); border:1px solid var(--sv-line); border-radius:var(--sv-card); box-shadow:var(--sv-shadow); padding:18px 20px; }
.section-head { margin-bottom:12px; }
.section-title { font-size:16px; font-weight:800; letter-spacing:-.3px; color:var(--c-text); }
.section-sub { font-size:12.5px; color:var(--c-text-muted); margin-top:2px; }
.section-count { color:var(--c-text-muted); font-weight:700; }

/* ---------- tables (.driver-table style) ---------- */
.tbl-wrap { overflow:hidden; border-radius:12px; border:1px solid var(--sv-line); }
table.r-table { width:100%; border-collapse:collapse; font-size:13px; }
table.r-table thead th { background:var(--sv-line-2); text-transform:uppercase; letter-spacing:.5px; font-size:10.5px; font-weight:700; color:var(--c-text-muted); padding:11px 12px; text-align:center; white-space:nowrap; }
table.r-table thead th:first-child { text-align:left; padding-left:14px; }
table.r-table td { padding:12px; text-align:center; font-variant-numeric:tabular-nums; border-bottom:1px solid var(--sv-line-2); color:var(--c-text); }
table.r-table td:first-child { text-align:left; padding-left:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
table.r-table tbody tr { transition:background .1s; }
table.r-table tbody tr:hover td { background:var(--sv-primary-soft); }
table.r-table tbody tr.totals td { background:var(--c-bg-tint); font-weight:800; color:var(--c-primary-dark); border-bottom:none; }
table.r-table tbody tr:last-child td { border-bottom:none; }
.country-dot { width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0; }
td.highlight { color:var(--c-accent); font-weight:800; }
td.warn-num { color:var(--c-warn); font-weight:700; }
.city-name { font-weight:700; color:var(--c-text); }
.remarks-cell { color:var(--c-text-muted); font-size:12px; text-align:left; }
table.r-table td.remarks-cell, table.r-table th.remarks-col { text-align:left; }
table.r-table td.left, table.r-table th.left { text-align:left; }
.days-old { color:var(--c-danger); font-weight:800; }
.days-fresh { color:var(--c-text-muted); font-weight:600; }
.empty-row td { text-align:center; color:var(--c-text-muted); padding:40px; }

/* status pills */
.status-pill { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px; font-size:10px; font-weight:700; letter-spacing:.4px; }
.status-pill::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
.pill-open { background:color-mix(in srgb, var(--c-success) 14%, transparent); color:var(--c-success); }
.pill-hold { background:color-mix(in srgb, var(--c-warn) 16%, transparent); color:var(--c-warn); }
.pill-short { background:color-mix(in srgb, var(--c-accent) 16%, transparent); color:var(--c-primary); }
.pill-progress { background:#ECEDFD; color:#4F46E5; }
[data-theme="dark"] .pill-progress { background:#2A2E54; color:#A5B4FC; }

/* ---------- map ---------- */
#map { height:100%; min-height:420px; background:var(--c-bg-tint); }
.leaflet-container { background:var(--c-bg-tint); font-family:inherit; }
[data-theme="dark"] .leaflet-tile-pane { filter:invert(1) hue-rotate(180deg) brightness(.95) contrast(.9); }
[data-theme="dark"] .leaflet-popup-content-wrapper, [data-theme="dark"] .leaflet-popup-tip { background:var(--c-surface); color:var(--c-text); }
[data-theme="dark"] .leaflet-control-attribution { background:rgba(15,23,42,.75) !important; color:var(--c-text-muted) !important; }
.map-panel { padding:0; overflow:hidden; display:flex; flex-direction:column; }
.map-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:18px 20px 12px; }
.map-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.map-controls select { padding:8px 12px; border:1px solid var(--sv-line); border-radius:10px; font-size:12.5px; font-weight:600; font-family:inherit; background:var(--c-bg); color:var(--c-text); }
.map-controls select:focus { outline:none; border-color:var(--c-accent); box-shadow:0 0 0 3px rgba(74,159,224,.15); }
.sw { display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--c-text-muted); cursor:pointer; user-select:none; position:relative; }
.sw input { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }
.sw-track { width:38px; height:22px; border-radius:999px; background:var(--c-border-strong); position:relative; transition:background .15s; flex-shrink:0; }
.sw-track::after { content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .15s; }
.sw input:checked + .sw-track { background:var(--c-primary); }
.sw input:checked + .sw-track::after { transform:translateX(16px); }
.sw input:focus-visible + .sw-track { box-shadow:0 0 0 3px rgba(74,159,224,.3); }
.map-legend { padding:11px 16px; border-top:1px solid var(--sv-line); background:var(--sv-line-2); font-size:12px; color:var(--c-text-muted); display:flex; align-items:center; gap:16px; flex-wrap:wrap; border-radius:0 0 12px 12px; min-height:44px; }
.map-legend strong { color:var(--c-text); }
.lg-key { display:inline-flex; align-items:center; gap:7px; white-space:nowrap; }
.lg-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.lg-dot.vac { background:var(--c-accent); border:2px solid #fff; box-shadow:0 0 0 1px var(--c-border-strong); }
.lg-dot.base { background:var(--c-surface); border:2px solid var(--c-text-dim); }
.lg-dot.near { background:var(--c-success); }
.lg-readout { color:var(--c-text); }
.lg-clear { background:none; border:none; color:var(--c-primary); font-weight:700; font-size:12px; cursor:pointer; padding:0; font-family:inherit; text-decoration:underline; }

/* ---------- states ---------- */
.loading { text-align:center; padding:70px 20px; color:var(--c-text-muted); }
.spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--sv-line); border-top-color:var(--c-primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.error-box { background:color-mix(in srgb, var(--c-danger) 12%, transparent); color:var(--c-danger); padding:16px 20px; border-radius:var(--sv-card); font-size:13px; border:1px solid color-mix(in srgb, var(--c-danger) 30%, transparent); }

/* ---------- footer ---------- */
footer.report-footer { color:var(--c-text-dim); font-size:11.5px; display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-top:8px; padding-top:14px; border-top:1px solid var(--sv-line); }

/* ---------- theme toggle ---------- */
.theme-toggle-btn { position:fixed; bottom:20px; right:20px; width:44px; height:44px; border-radius:50%; background:var(--c-surface); border:1px solid var(--c-border); color:var(--c-text); cursor:pointer; z-index:9998; box-shadow:0 4px 12px rgba(15,23,42,.12); display:grid; place-items:center; font-family:inherit; transition:transform .15s ease, border-color .15s ease; padding:0; }
.theme-toggle-btn:hover { border-color:var(--c-primary); transform:translateY(-2px); }
.theme-toggle-btn svg { display:block; }

/* ---------- collapse (desktop) ---------- */
@media (min-width:881px) {
  body.sv-shell.sv-collapsed { padding-left:76px; }
  .sv-collapsed .sv-sidebar { width:76px; padding-left:12px; padding-right:12px; }
  .sv-collapsed .sv-brand { align-items:center; }
  .sv-collapsed .sv-brand-logo { display:none; }
  .sv-collapsed .sv-brand-mark { display:grid; }
  .sv-collapsed .sv-brand-region { display:none; }
  .sv-collapsed .sv-nav-label { display:none; }
  .sv-collapsed .sv-nav-item { justify-content:center; padding:10px; gap:0; }
  .sv-collapsed .sv-nav-item > span:last-child { display:none; }
  .sv-collapsed .sv-foot { justify-content:center; }
  .sv-collapsed .sv-foot-status { display:none; }
  .sv-collapsed .sv-collapse-btn svg { transform:rotate(180deg); }
}

/* ---------- responsive ---------- */
@media (max-width:1100px) { .kpi-row { grid-template-columns:repeat(2,1fr); } }
@media (max-width:980px) { .two-col { grid-template-columns:1fr; } #map { min-height:320px; } }
@media (max-width:880px) {
  body.sv-shell, body.sv-shell.sv-collapsed { padding-left:0; }
  .sv-sidebar { transform:translateX(-100%); width:252px; padding-left:14px; padding-right:14px; box-shadow:var(--sv-shadow-lg); }
  body.sv-nav-open .sv-sidebar { transform:translateX(0); }
  body.sv-nav-open .sv-backdrop { opacity:1; pointer-events:auto; }
  .sv-burger { display:grid; }
  .sv-collapse-btn { display:none; }
  #app-content { padding:16px 14px 36px; padding-top:64px; }
}
@media (max-width:560px) {
  .kpi-row { grid-template-columns:1fr 1fr; gap:10px; }
  .kpi-value { font-size:22px; }
  table.r-table th:nth-child(6), table.r-table td:nth-child(6) { display:none; }
}
@media print {
  .sv-sidebar, .sv-burger, .theme-toggle-btn, .ph-actions { display:none !important; }
  body.sv-shell { padding-left:0 !important; }
  #app-content { padding:0 !important; }
  .section-card, .scorecard { box-shadow:none !important; }
}
</style>
</head>

<script>

(function wireShell() {
  const col = document.getElementById('sv-collapse');
  col.addEventListener('click', () => {
    const on = document.body.classList.toggle('sv-collapsed');
    try { localStorage.setItem('AC_SIDEBAR_COLLAPSED', on ? '1' : '0'); } catch (e) {}
    setTimeout(() => { window.dispatchEvent(new Event('resize')); if (mapInstance) mapInstance.invalidateSize(); }, 230);
  });
  try { if (localStorage.getItem('AC_SIDEBAR_COLLAPSED') === '1') document.body.classList.add('sv-collapsed'); } catch (e) {}
  document.getElementById('sv-burger').addEventListener('click', () => document.body.classList.add('sv-nav-open'));
  document.getElementById('sv-backdrop').addEventListener('click', () => document.body.classList.remove('sv-nav-open'));

function setThemeIcon() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-toggle').innerHTML = svgIcon(dark ? 'sun' : 'moon', 19, 1.8);
}
(function setupTheme() {
  try { if (localStorage.getItem('AC_THEME') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
  setThemeIcon();
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (dark) document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', 'dark');
    try { localStorage.setItem('AC_THEME', dark ? 'light' : 'dark'); } catch (e) {}
    setThemeIcon();
    if (recruitmentData) renderContent();
  });
})();

}

async function loadData(forceRefresh) {
  try {
    const url = CONFIG.scriptUrl + '?action=getRecruitmentData';
    const res = await cachedFetch(url, 300, { forceRefresh: !!forceRefresh });
    if (!res.success) throw new Error(res.error || 'Erro do backend');
    recruitmentData = res.data;
    renderContent();
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">Erro ao carregar dados: ' + escapeHtml(err.message) + '</div>';
  }
}

function renderContent() {
  if (!recruitmentData) return;
  const demand = recruitmentData.demand || [];
  const summary = recruitmentData.summary || [];
  const summaryByCountry = {};
  summary.forEach(s => { summaryByCountry[s.country] = s; });

  const stuck = demand.filter(d => { const days = computeDaysOpen(d.raisedOn); return days !== null && days >= 30; }).length;

  const demandWithAge = demand.map(d => ({ ...d, daysOpen:computeDaysOpen(d.raisedOn) })).sort((a, b) => (b.daysOpen || 0) - (a.daysOpen || 0));

    `${t('asOf')}<strong>${now.toLocaleDateString(locale, { day:'2-digit', month:'long', year:'numeric' })}</strong>`;

            </select>
            <label class="sw"><input type="checkbox" id="map-bases"><span class="sw-track"></span><span>${t('showBases')}</span></label>
          </div>
        </div>
        <div id="map" style="flex:1;"></div>
        <div class="map-legend" id="map-legend"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-head"><div class="section-title">${t('sectionAging')} <span class="section-count">(${totalOpen})</span></div></div>
      <div class="tbl-wrap"><table class="r-table">
        <thead><tr>
          <th>${t('colCountry')}</th><th class="left">${t('colCity')}</th><th class="left">${t('colStatus')}</th>
          <th>${t('colRaisedOn')}</th><th>${t('colDaysOpen')}</th><th class="remarks-col">${t('colRemarks')}</th>
        </tr></thead>
        <tbody>
          ${demandWithAge.length === 0
            ? `<tr class="empty-row"><td colspan="6">${t('noOpen')}</td></tr>`
            : demandWithAge.map(d => {
                const sk = (d.status || '').toLowerCase();
                let pillCls = 'pill-open', label = t('statusOpen');
                if (sk === 'on hold') { pillCls = 'pill-hold'; label = t('statusOnHold'); }
                else if (sk === 'shortlisted') { pillCls = 'pill-short'; label = t('statusShortlisted'); }
                else if (sk === 'in progress') { pillCls = 'pill-progress'; label = t('statusInProgress'); }
                const isOld = d.daysOpen !== null && d.daysOpen >= 30;
                const color = COUNTRY_COLOR[d.country] || 'var(--c-accent)';
                return `<tr>
                  <td><span class="country-dot" style="background:${color}"></span>${escapeHtml(d.country)}</td>
                  <td class="city-name left">${escapeHtml(d.city || '—')}</td>
                  <td class="left"><span class="status-pill ${pillCls}">${label}</span></td>
                  <td>${formatDate(d.raisedOn, locale)}</td>
                  <td class="${isOld ? 'days-old' : 'days-fresh'}">${d.daysOpen !== null ? d.daysOpen + 'd' : '—'}</td>
                  <td class="remarks-cell">${escapeHtml(d.remarks || '—')}</td>
                </tr>`;
              }).join('')
          }
        </tbody>
      </table></div>
    </div>
  `;

  vacancies = demandWithAge.map(d => { const c = CITY_COORDS[d.city] || COUNTRY_CENTROID[d.country] || [0, 0]; return { ...d, lat:c[0], lng:c[1] }; });
  selectedVacancy = null;
  wireMapControls();
  renderMap();
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(lat2 - lat1), dLng = toR(lng2 - lng1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function wireMapControls() {
  const sel = document.getElementById('map-country');
  const bz = document.getElementById('map-bases');
  if (sel) {
    sel.value = mapCountry;
    sel.addEventListener('change', () => { mapCountry = sel.value; selectedVacancy = null; renderMap(); });
  }
  if (bz) {
    bz.checked = showBases;
    bz.addEventListener('change', () => { showBases = bz.checked; if (!showBases) selectedVacancy = null; renderMap(); });
  }
}

function selectVacancy(v) {
  selectedVacancy = (selectedVacancy === v) ? null : v;
  if (selectedVacancy) {
    showBases = true;
    const bz = document.getElementById('map-bases');
    if (bz) bz.checked = true;
  }
  renderMap();
}

function statusLabel(status) {
  const sk = (status || '').toLowerCase();
  if (sk === 'on hold') return t('statusOnHold');
  if (sk === 'shortlisted') return t('statusShortlisted');
  if (sk === 'in progress') return t('statusInProgress');
  return t('statusOpen');
}

function renderMap() {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  const mapEl = document.getElementById('map');
  if (!mapEl) return;
  mapInstance = L.map(mapEl, { zoomControl:true, attributionControl:true, scrollWheelZoom:true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap, © CARTO', subdomains:'abcd', maxZoom:12,
  }).addTo(mapInstance);

  const vacs = vacancies.filter(v => mapCountry === 'all' || v.country === mapCountry);
  const drivers = DEMO_DRIVERS.filter(d => mapCountry === 'all' || d.country === mapCountry);

  // Raio de proximidade + quem está perto da vaga selecionada
  const near = new Set();
  if (selectedVacancy) {
    const sv = selectedVacancy;
    L.circle([sv.lat, sv.lng], {
      radius: RADIUS_KM * 1000, color:'#4A9FE0', weight:1.5,
      fillColor:'#4A9FE0', fillOpacity:0.08, dashArray:'5 6',
    }).addTo(mapInstance);
    drivers.forEach(dr => { if (haversine(sv.lat, sv.lng, dr.lat, dr.lng) <= RADIUS_KM) near.add(dr); });
  }

  // Bases dos motoristas (toggle)
  if (showBases) {
    drivers.forEach(dr => {
      const isNear = near.has(dr);
      const ringColor = isNear ? '#16A34A' : (COUNTRY_COLOR[dr.country] || '#64748B');
      const m = L.circleMarker([dr.lat, dr.lng], {
        radius: isNear ? 6 : 5,
        fillColor: isNear ? '#16A34A' : '#FFFFFF',
        color: ringColor, weight: 2,
        opacity: (selectedVacancy && !isNear) ? 0.4 : 0.95,
        fillOpacity: isNear ? 0.95 : 0.9,
      }).addTo(mapInstance);
      const dist = selectedVacancy ? '<br>' + Math.round(haversine(selectedVacancy.lat, selectedVacancy.lng, dr.lat, dr.lng)) + ' km' : '';
      m.bindTooltip(`<b>${escapeHtml(dr.name)}</b><br>${escapeHtml(dr.city)} · ${escapeHtml(dr.country)}${dist}`, { direction:'top', opacity:0.95 });
    });
  }

  // Marcadores das vagas (por cima), em pontos exatos das cidades
  vacs.forEach(v => {
    const sel = selectedVacancy === v;
    const color = COUNTRY_COLOR[v.country] || '#4A9FE0';
    const m = L.circleMarker([v.lat, v.lng], {
      radius: sel ? 10 : 8, fillColor: color, color:'#FFFFFF',
      weight: sel ? 3 : 2, opacity: 1, fillOpacity: 0.95,
    }).addTo(mapInstance);
    m.bindTooltip(`<b>${escapeHtml(v.city)}</b> · ${escapeHtml(v.country)}<br>${statusLabel(v.status)} · ${v.daysOpen != null ? v.daysOpen + 'd' : '—'}`, { direction:'top', opacity:0.95 });
    m.on('click', () => selectVacancy(v));
  });

  // Enquadramento
  const pts = vacs.map(v => [v.lat, v.lng]);
  if (showBases) drivers.forEach(d => pts.push([d.lat, d.lng]));
  if (mapCountry !== 'all' && pts.length) mapInstance.fitBounds(pts, { padding:[45, 45], maxZoom:7 });
  else mapInstance.fitBounds([[-55, -118], [33, -34]], { padding:[10, 10] });

  updateMapLegend(near.size);
}

function updateMapLegend(nearCount) {
  const el = document.getElementById('map-legend');
  if (!el) return;
  let keys = `<span class="lg-key"><span class="lg-dot vac"></span>${t('legVac')}</span>`;
  if (showBases) keys += `<span class="lg-key"><span class="lg-dot base"></span>${t('legBase')}</span>`;
  if (selectedVacancy) keys += `<span class="lg-key"><span class="lg-dot near"></span>${t('legNear')}</span>`;
  let right;
  if (selectedVacancy) {
    const msg = nearCount > 0
      ? t('nearN').replace('{n}', nearCount).replace('{km}', RADIUS_KM)
      : t('near0').replace('{km}', RADIUS_KM);
    right = `<span style="margin-left:auto;display:inline-flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <span class="lg-readout"><strong>${escapeHtml(selectedVacancy.city)}</strong> — ${msg}</span>
      <button type="button" class="lg-clear" id="lg-clear">${t('clearSel')}</button></span>`;
  } else {
    right = `<span style="margin-left:auto;color:var(--c-text-dim);">${t('legHint')}</span>`;
  }
  el.innerHTML = keys + right;
  const c = document.getElementById('lg-clear');
  if (c) c.addEventListener('click', () => { selectedVacancy = null; renderMap(); });
}

function computeDaysOpen(raisedOn) {
  if (!raisedOn) return null;
  let d;
  if (/^\d{4}-\d{2}-\d{2}$/.test(raisedOn)) d = new Date(raisedOn + 'T00:00:00');
  else if (/^\d{2}\/\d{2}\/\d{4}$/.test(raisedOn)) { const [day, mo, yr] = raisedOn.split('/').map(Number); d = new Date(yr, mo - 1, day); }
  else d = new Date(raisedOn);
  if (isNaN(d.getTime())) return null;
  const diff = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
  return diff >= 0 ? diff : null;
}
function formatDate(s, locale) {
  if (!s) return '—';
  let d;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) d = new Date(s + 'T00:00:00');
  else if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [day, mo, yr] = s.split('/').map(Number); d = new Date(yr, mo - 1, day); }
  else d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return d.toLocaleDateString(locale, { day:'2-digit', month:'2-digit', year:'2-digit' });
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.addEventListener('DOMContentLoaded', () => {
  applyI18n();
  startApp({ username:'fuss', name:'Lucas F.' });
});
</script>
